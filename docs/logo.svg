<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  
  <!-- Lightning bolt / Token symbol -->
  <g filter="url(#glow)">
    <!-- Main lightning bolt -->
    <path d="M110 30 L70 95 L95 95 L85 170 L130 100 L105 100 L120 30 Z" 
          fill="url(#cyanGlow)" 
          stroke="#22d3ee" 
          stroke-width="2"
          stroke-linejoin="round"/>
    
    <!-- Token ring -->
    <circle cx="100" cy="100" r="55" 
            fill="none" 
            stroke="#22d3ee" 
            stroke-width="3" 
            stroke-dasharray="20 10"
            opacity="0.6"/>
    
    <!-- Terminal prompt symbols -->
    <text x="45" y="150" font-family="monospace" font-size="16" fill="#22d3ee" opacity="0.5">&gt;_</text>
  </g>
</svg>