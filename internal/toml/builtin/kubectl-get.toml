[[rules]]
match_command = "kubectl get *"
description = "kubectl get - list Kubernetes resources"

[rules.filter]
# Keep header and data, strip noise
strip_lines_matching = [
    "^\\s*$",
]

# Keep header row
replace = [
    { from = "^NAME\\s+", to = "NAME " },
]

max_lines = 200

[rules.filter.on_empty]
return = "No resources found"

[tests]
[[tests.kubectl_get]]
name = "compact pod list"
input = "NAME                        READY   STATUS    RESTARTS   AGE\nweb-server-abc123           1/1     Running   0          2d\napi-server-def456           1/1     Running   1          5d\ndb-statefulset-0            1/1     Running   0          10d\nredis-xyz-789               0/1     Error     3          1d"
expected = "web-server-abc123     Running  (0 restarts)\napi-server-def456     Running  (1 restarts)\ndb-statefulset-0      Running  (0 restarts)\nredis-xyz-789         Error    (3 restarts)"
