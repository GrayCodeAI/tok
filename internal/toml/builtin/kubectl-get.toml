[[rules]]
match_command = "kubectl get *"
description = "kubectl get - list Kubernetes resources"

[rules.filter]
# Keep header and data, strip noise
strip_lines_matching = [
    "^\\s*$",
]

# Keep header row
replace = [
    { from = "^NAME\\s+", to = "NAME " },
]

max_lines = 200

[rules.filter.on_empty]
return = "No resources found"

[tests]
[[tests.kubectl_get]]
name = "compact pod list"
input = """
NAME                        READY   STATUS    RESTARTS   AGE
web-server-abc123           1/1     Running   0          2d
api-server-def456           1/1     Running   1          5d
db-statefulset-0            1/1     Running   0          10d
redis-xyz-789               0/1     Error     3          1d
"""
expected = """
web-server-abc123     Running  (0 restarts)
api-server-def456     Running  (1 restarts)
db-statefulset-0      Running  (0 restarts)
redis-xyz-789         Error    (3 restarts)
"""
