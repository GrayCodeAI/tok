[filters.df]
description = "Compact df output — truncate wide columns, limit rows"
match_command = "^df(\\s|$)"
strip_ansi = true
truncate_lines_at = 80
max_lines = 20

[[tests.df]]
name = "short output passes through unchanged"
input = "Filesystem     1K-blocks   Used Available Use% Mounted on\n/dev/sda1        4096000 123456   3972544   4% /"
expected = "Filesystem     1K-blocks   Used Available Use% Mounted on\n/dev/sda1        4096000 123456   3972544   4% /"

[[tests.df]]
name = "empty input passes through"
input = ""
expected = ""

# Inline tests
[tests]

[[tests.df]]
name = "compact disk usage"
input = "Filesystem     1K-blocks      Used Available Use% Mounted on\n/dev/sda1      1000204800  500102400  500102400  50% /\ntmpfs            8170048         0    8170048   0% /dev\n/dev/sda2       524288000  262144000  262144000  50% /home"
expected = "/: 500G / 1000G (50% used)\n/dev: 0 / 8G (0% used)\n/home: 262G / 524G (50% used)"
