[filters.du]
description = "Compact du output"
match_command = "^du\\b"
strip_lines_matching = ["^\\s*$"]
truncate_lines_at = 120
max_lines = 40

[[tests.du]]
name = "preserves sizes, strips blank lines"
input = "4.0K\t./src\n\n8.0K\t./tests\n16K\t."
expected = "4.0K\t./src\n8.0K\t./tests\n16K\t."

[[tests.du]]
name = "single line passthrough"
input = "128K\t."
expected = "128K\t."

# Inline tests
[tests]

[[tests.du]]
name = "compact usage"
input = "4.0K    ./src/utils\n8.0K    ./src/pkg\n128K    ./src\n16K     ./test\n256K    ./docs\n512K    ./node_modules\n1024K   ."
expected = "src/          128K\ntest/         16K\ndocs/         256K\nnode_modules/ 512K\nTotal:        1024K"
