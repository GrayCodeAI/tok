[[rules]]
match_command = "fd"
description = "fd - fast file finder"

[rules.filter]
# Strip common noise directories from output
strip_lines_matching = [
    "node_modules/",
    ".git/",
    "target/",
    "__pycache__/",
    ".venv/",
    "vendor/",
    "dist/",
    "build/",
]

# Max lines for large directory listings
max_lines = 200

[rules.filter.on_empty]
return = "No files found"

# Inline tests
[tests]

[[tests.fd]]
name = "lists files"
input = "src/main.go\nsrc/utils/helper.go\nsrc/utils/config.go\ntest/main_test.go\ngo.mod\ngo.sum\nREADME.md"
expected = "src/\n├── main.go\n└── utils/\n    ├── helper.go\n    └── config.go\ntest/\n└── main_test.go\ngo.mod\ngo.sum\nREADME.md"
