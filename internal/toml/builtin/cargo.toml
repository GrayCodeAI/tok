# Cargo (Rust) CLI filter
schema_version = 1

[cargo_build]
match_command = "^cargo(\\s+build)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^Compiling .*",
    "^    Checking .*",
    "^    Finished .*",
    "^    Running .*",
    "^\\s*$",
    "^\\x1b\\[",
]
keep_lines_matching = [
    "error\\[.*",
    "warning\\[.*",
    "Error:.*",
    "cannot find",
    "unresolved",
]
on_empty = "Build completed"

[cargo_test]
match_command = "^cargo(\\s+test)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^running \\d+ tests?",
    "^test .* ok$",
    "^\\s*$",
    "^\\x1b\\[",
]
keep_lines_matching = [
    "FAILED",
    "error",
    "panicked",
    "assertion failed",
    "test result:",
]
head = 20
tail = 50
max_lines = 100

[cargo_check]
match_command = "^cargo(\\s+check)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^Compiling .*",
    "^Checking .*",
    "^Finished .*",
    "^\\s*$",
]
keep_lines_matching = [
    "error\\[.*",
    "warning\\[.*",
]
on_empty = "No errors"

[cargo_run]
match_command = "^cargo(\\s+run)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^Compiling .*",
    "^Finished .*",
    "^Running .*",
    "^\\x1b\\[",
]
tail = 100
max_lines = 150

# Inline tests
[tests]

[[tests.cargo_test]]
name = "summarizes test output"
input = """
   Compiling mylib v0.1.0
   Compiling myapp v0.1.0
   Finished test [unoptimized + debuginfo] target(s) in 3.42s
   Running unittests src/lib.rs (target/debug/deps/mylib-abc123)

running 42 tests
test tests::test_basic ... ok
test tests::test_advanced ... ok
test tests::test_edge_case ... FAILED

failures:
---- tests::test_edge_case stdout ----
thread 'tests::test_edge_case' panicked at 'assertion failed', src/lib.rs:100
note: run with `RUST_BACKTRACE=1` environment variable
failures:
    test
"""
expected = """
FAILING: tests::test_edge_case
  src/lib.rs:100: assertion failed
"""

[[tests.cargo_test]]
name = "hides passing tests"
input = """
   Compiling myapp v0.1.0
   Finished test [unoptimized + debuginfo] target(s) in 1.2s
   Running unittests (target/debug/deps/myapp-xyz)

running 10 tests
test tests::one ... ok
test tests::two ... ok
test tests::three ... ok
test tests::four ... ok
test tests::five ... ok

test result: ok. 10 passed
"""
expected = """
Tests: 10 passed
"""

[[tests.cargo_build]]
name = "strips compilation steps"
input = """
   Compiling serde v1.0.0
   Compiling tokio v1.2.0
   Compiling myapp v0.1.0 (src/main.rs)
    Finished dev [unoptimized + debuginfo] target(s) in 2.15s
"""
expected = "Build: myapp v0.1.0 (2.15s)"

[[tests.cargo_build]]
name = "shows build errors"
input = """
   Compiling myapp v0.1.0
error[E0425]: cannot find function `does_not_exist` in this scope
  --> src/main.rs:10:5
   |
10 |     does_not_exist();
   |     ^^^^^^^^^^^^^^ not found in this scope
"""
expected = "error[E0425]: cannot find function `does_not_exist` in this scope"
[[tests.cargo_build]]
name = "shows clippy warnings"
input = """
    Checking myapp v0.1.0
warning: unused import: `std::collections::HashMap`
 --> src/main.rs:1:5
  |
1 | use std::collections::HashMap;
  |     ^^^^^^^^^^^^^^^^^^^^^^^^^
    Finished dev [unoptimized + debuginfo] target(s) in 1.23s
"""
expected = "warning: unused import: `std::collections::HashMap`"
