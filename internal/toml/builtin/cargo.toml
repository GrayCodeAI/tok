# Cargo (Rust) CLI filter
schema_version = 1

[cargo_build]
match_command = "^cargo(\\s+build)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^Compiling .*",
    "^    Checking .*",
    "^    Finished .*",
    "^    Running .*",
    "^\\s*$",
    "^\\x1b\\[",
]
keep_lines_matching = [
    "error\\[.*",
    "warning\\[.*",
    "Error:.*",
    "cannot find",
    "unresolved",
]
on_empty = "Build completed"

[cargo_test]
match_command = "^cargo(\\s+test)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^running \\d+ tests?",
    "^test .* ok$",
    "^\\s*$",
    "^\\x1b\\[",
]
keep_lines_matching = [
    "FAILED",
    "error",
    "panicked",
    "assertion failed",
    "test result:",
]
head = 20
tail = 50
max_lines = 100

[cargo_check]
match_command = "^cargo(\\s+check)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^Compiling .*",
    "^Checking .*",
    "^Finished .*",
    "^\\s*$",
]
keep_lines_matching = [
    "error\\[.*",
    "warning\\[.*",
]
on_empty = "No errors"

[cargo_run]
match_command = "^cargo(\\s+run)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^Compiling .*",
    "^Finished .*",
    "^Running .*",
    "^\\x1b\\[",
]
tail = 100
max_lines = 150

# Inline tests
[tests]

[[tests.cargo_test]]
name = "summarizes test output"
input = "   Compiling mylib v0.1.0\n   Compiling myapp v0.1.0\n   Finished test [unoptimized + debuginfo] target(s) in 3.42s\n   Running unittests src/lib.rs (target/debug/deps/mylib-abc123)\n\nrunning 42 tests\ntest tests::test_basic ... ok\ntest tests::test_advanced ... ok\ntest tests::test_edge_case ... FAILED\n\nfailures:\n---- tests::test_edge_case stdout ----\nthread 'tests::test_edge_case' panicked at 'assertion failed', src/lib.rs:100\nnote: run with `RUST_BACKTRACE=1` environment variable\nfailures:\n    test"
expected = "FAILING: tests::test_edge_case\n  src/lib.rs:100: assertion failed"

[[tests.cargo_test]]
name = "hides passing tests"
input = "   Compiling myapp v0.1.0\n   Finished test [unoptimized + debuginfo] target(s) in 1.2s\n   Running unittests (target/debug/deps/myapp-xyz)\n\nrunning 10 tests\ntest tests::one ... ok\ntest tests::two ... ok\ntest tests::three ... ok\ntest tests::four ... ok\ntest tests::five ... ok\n\ntest result: ok. 10 passed"
expected = "Tests: 10 passed"

[[tests.cargo_build]]
name = "strips compilation steps"
input = "   Compiling serde v1.0.0\n   Compiling tokio v1.2.0\n   Compiling myapp v0.1.0 (src/main.rs)\n    Finished dev [unoptimized + debuginfo] target(s) in 2.15s"
expected = "Build: myapp v0.1.0 (2.15s)"

[[tests.cargo_build]]
name = "shows build errors"
input = "   Compiling myapp v0.1.0\nerror[E0425]: cannot find function `does_not_exist` in this scope\n  --> src/main.rs:10:5\n   |\n10 |     does_not_exist();\n   |     ^^^^^^^^^^^^^^ not found in this scope"
expected = "error[E0425]: cannot find function `does_not_exist` in this scope"
[[tests.cargo_build]]
name = "shows clippy warnings"
input = "    Checking myapp v0.1.0\nwarning: unused import: `std::collections::HashMap`\n --> src/main.rs:1:5\n  |\n1 | use std::collections::HashMap;\n  |     ^^^^^^^^^^^^^^^^^^^^^^^^^\n    Finished dev [unoptimized + debuginfo] target(s) in 1.23s"
expected = "warning: unused import: `std::collections::HashMap`"
