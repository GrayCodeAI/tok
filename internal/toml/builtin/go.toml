# Go CLI filter
schema_version = 1

[go_build]
match_command = "^go(\\s+build)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^\\s*$",
    "^\\x1b\\[",
]
keep_lines_matching = [
    "error:.*",
    "undefined:",
    "cannot find",
    "cannot use",
]
on_empty = "Build completed"

[go_test]
match_command = "^go(\\s+test)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^\\s*$",
    "^\\x1b\\[",
    "^PASS$",
    "^ok\\s+",
]
keep_lines_matching = [
    "FAIL\\s+",
    "--- FAIL:",
    "panic:",
    "Error:.*",
    "expected",
    "got",
]
head = 20
tail = 50
max_lines = 100

[go_mod]
match_command = "^go(\\s+mod)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^go: downloading",
    "^\\s*$",
]
keep_lines_matching = [
    "go: added",
    "go: removed",
    "go: updated",
    "go: found",
    "Error:.*",
]
max_lines = 50

[go_vet]
match_command = "^go(\\s+vet)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = ["^\\s*$"]
keep_lines_matching = [
    ".*\\.go:\\d+:",
    "Error:.*",
]
on_empty = "No issues"

[go_fmt]
match_command = "^go(\\s+fmt)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = ["^\\s*$"]
on_empty = "Formatted"

# Inline tests
[tests]

[[tests.go_test]]
name = "summarizes passing tests"
input = """
ok  	github.com/example/mypkg	2.341s
ok  	github.com/example/another	1.234s	coverage: 85.0%
?   	github.com/example/util	[no test files]
"""
expected = """
3 passed, 0 failed, 1 no-test
"""

[[tests.go_build]]
name = "strips verbose build output"
input = """
internal/pkg/file.go:10:2: import declared but not used
# github.com/example/project
./main.go:1:1: package command-line-arguments; expected package main
"""
expected = """
./main.go:1:1: package command-line-arguments; expected package main
"""
