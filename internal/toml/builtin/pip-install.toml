[[rules]]
match_command = "pip install *"
description = "pip - Python package manager"

[rules.filter]
keep_lines_matching = [
    "ERROR.*",
    "WARNING.*",
    "Successfully installed.*",
    "Requirement already satisfied.*",
]

strip_lines_matching = [
    "^\\s*Downloading.*",
    "^\\s*Installing.*",
    "^\\s*Collecting.*",
    "^\\s*Using cached.*",
    "^\\s*\\[.*\\].*",
    "^\\s*━.*",
]

max_lines = 30

[rules.filter.on_empty]
return = "pip: installation completed"

# Inline tests
[tests]

[[tests.pip_install]]
name = "summarizes install output"
input = """
Collecting requests
  Downloading requests-2.31.0-py3-none-any.whl
Collecting urllib3
  Downloading urllib3-2.1.0-py3-none-any.whl
Installing collected packages: urllib3, requests
Successfully installed requests-2.31.0 urllib3-2.1.0
"""
expected = "Successfully installed requests-2.31.0 urllib3-2.1.0"

[[tests.pip_install]]
name = "shows installation errors"
input = """
Collecting flask
  Downloading Flask-3.0.0.tar.gz
  Installing build dependencies: started
  Installing build dependencies: finished with status 'error'
  error: subprocess-exited-with-error
  × Building wheel for flask failed
"""
expected = "error: subprocess-exited-with-error"
