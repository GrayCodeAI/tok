[[rules]]
match_command = "pip install *"
description = "pip - Python package manager"

[rules.filter]
keep_lines_matching = [
    "ERROR.*",
    "WARNING.*",
    "Successfully installed.*",
    "Requirement already satisfied.*",
]

strip_lines_matching = [
    "^\\s*Downloading.*",
    "^\\s*Installing.*",
    "^\\s*Collecting.*",
    "^\\s*Using cached.*",
    "^\\s*\\[.*\\].*",
    "^\\s*━.*",
]

max_lines = 30

[rules.filter.on_empty]
return = "pip: installation completed"

# Inline tests
[tests]

[[tests.pip_install]]
name = "summarizes install output"
input = "Collecting requests\n  Downloading requests-2.31.0-py3-none-any.whl\nCollecting urllib3\n  Downloading urllib3-2.1.0-py3-none-any.whl\nInstalling collected packages: urllib3, requests\nSuccessfully installed requests-2.31.0 urllib3-2.1.0"
expected = "Successfully installed requests-2.31.0 urllib3-2.1.0"

[[tests.pip_install]]
name = "shows installation errors"
input = "Collecting flask\n  Downloading Flask-3.0.0.tar.gz\n  Installing build dependencies: started\n  Installing build dependencies: finished with status 'error'\n  error: subprocess-exited-with-error\n  × Building wheel for flask failed"
expected = "error: subprocess-exited-with-error"
