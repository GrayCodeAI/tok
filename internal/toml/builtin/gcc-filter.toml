[[rules]]
match_command = "gcc *"
description = "gcc - GNU C compiler"

[rules.filter]
# Keep only error and warning lines
keep_lines_matching = [
    ".*error:.*",
    ".*warning:.*",
    ".*note:.*",
]

# Max lines
max_lines = 50

[rules.filter.on_empty]
return = "gcc: compilation successful (no errors or warnings)"

[tests]
[[tests.gcc]]
name = "filters warnings"
input = "main.c: In function 'main':\nmain.c:10:5: warning: unused variable 'x' [-Wunused-variable]\n   10 |     int x;\n      |         ^\nmain.c:15:5: warning: 'gets' is deprecated\n   15 |     gets(buf);\n      |     ^~~~\n/usr/bin/ld: warning: cannot find entry symbol _start"
expected = "main.c:10:5: warning: unused variable 'x'\nmain.c:15:5: warning: 'gets' is deprecated\n/usr/bin/ld: warning: cannot find entry symbol _start"
