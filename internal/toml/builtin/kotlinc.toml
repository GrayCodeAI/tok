[[rules]]
match_command = "kotlinc *"
description = "kotlinc - Kotlin compiler"

[rules.filter]
keep_lines_matching = [
    "error:.*",
    "warning:.*",
    "e:.*",
    "w:.*",
]

strip_lines_matching = [
    "^\\s*$",
]

max_lines = 50

[rules.filter.on_empty]
return = "kotlinc: compilation successful"
[tests]
[[tests.kotlinc]]
name = "shows compilation errors"
input = """
e: src/Main.kt: (10, 5): Unresolved reference: foo
w: src/Main.kt: (15, 9): Variable 'x' is never used
e: src/Main.kt: (20, 12): Type mismatch: inferred type is String but Int was expected
"""
expected = """
e: src/Main.kt: (10, 5): Unresolved reference: foo
e: src/Main.kt: (20, 12): Type mismatch
w: src/Main.kt: (15, 9): Variable 'x' is never used
"""
