
# Inline tests
[tests]

[[tests.find]]
name = "compact tree output"
input = "./src\n./src/main.go\n./src/utils\n./src/utils/helper.go\n./src/utils/config.go\n./go.mod\n./go.sum\n./README.md"
expected = "src/\n├── main.go\n└── utils/\n    ├── helper.go\n    └── config.go\ngo.mod\ngo.sum\nREADME.md"

[[tests.find]]
name = "filtered by extension"
input = "./src/main.go\n./src/utils/helper.go\n./src/utils/config.go\n./src/test/main_test.go"
expected = "3 Go files found"
