
# Inline tests
[tests]

[[tests.find]]
name = "compact tree output"
input = """
./src
./src/main.go
./src/utils
./src/utils/helper.go
./src/utils/config.go
./go.mod
./go.sum
./README.md
"""
expected = """
src/
├── main.go
└── utils/
    ├── helper.go
    └── config.go
go.mod
go.sum
README.md
"""

[[tests.find]]
name = "filtered by extension"
input = """
./src/main.go
./src/utils/helper.go
./src/utils/config.go
./src/test/main_test.go
"""
expected = """
3 Go files found
"""
