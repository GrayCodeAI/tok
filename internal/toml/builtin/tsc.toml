
# Inline tests
[tests.tsc]
name = "groups errors by file"
input = """
src/app.ts:10:5 - error TS2322: Type 'string' is not assignable to type 'number'.
src/app.ts:15:10 - error TS2304: Cannot find name 'FooBar'.
src/utils.ts:5:12 - error TS7006: Parameter 'x' implicitly has an 'any' type.

