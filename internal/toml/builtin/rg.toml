[[rules]]
match_command = "rg"
description = "ripgrep - fast regex search"

[rules.filter]
# Strip ANSI codes
strip_ansi = true

# Keep matching lines, remove noise
strip_lines_matching = [
    "^Binary file .* matches$",
]

# Truncate long paths
replace = [
    { from = "^([^:]+:[0-9]+:).{500,}", to = "$1... (truncated)" },
]

# Max lines for large searches
max_lines = 500

[rules.filter.on_empty]
return = "No matches found"

# Inline tests
[tests]

[[tests.rg]]
name = "groups results by file"
input = "src/main.go:10:func main() {\nsrc/main.go:15:	fmt.Println(\\\"Hello\\\")\nsrc/utils.go:5:func helper() {\nREADME.md:100:keyword match"
expected = "src/main.go: 2 matches\nsrc/utils.go: 1 match\nREADME.md: 1 match"

[[tests.rg]]
name = "no matches"
input = ""
expected = "No matches found"
