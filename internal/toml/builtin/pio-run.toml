[filters.pio-run]
description = "Compact PlatformIO build output"
match_command = "^pio\\s+run"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^Verbose mode",
  "^CONFIGURATION:",
  "^LDF:",
  "^Library Manager:",
  "^Compiling\\s",
  "^Linking\\s",
  "^Building\\s",
  "^Checking size",
]
max_lines = 30
on_empty = "pio run: ok"

[[tests.pio-run]]
name = "strips build noise, preserves errors"
input = "Verbose mode can be enabled via `-v, --verbose` option\nCONFIGURATION: https://docs.platformio.org/page/boards/espressif32/esp32dev.html\nLDF: Library Dependency Finder -> https://bit.ly/configure-pio-ldf\nCompiling .pio/build/esp32dev/src/main.cpp.o\nBuilding .pio/build/esp32dev/firmware.elf\nLinking .pio/build/esp32dev/firmware.elf\nChecking size .pio/build/esp32dev/firmware.elf\nsrc/main.cpp:10:3: error: 'LED_BUILTINN' was not declared"
expected = "src/main.cpp:10:3: error: 'LED_BUILTINN' was not declared"

[[tests.pio-run]]
name = "on_empty when clean build with only noise"
input = "Verbose mode can be enabled via `-v, --verbose` option\nCompiling .pio/build/esp32dev/src/main.cpp.o\nLinking .pio/build/esp32dev/firmware.elf"
expected = "pio run: ok"
