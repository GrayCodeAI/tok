[[rules]]
match_command = "bundle install *"
description = "bundle install - Ruby gem installer"

[rules.filter]
keep_lines_matching = [
    "Installing.*",
    "Removing.*",
    "Bundle complete!.*",
    "Bundle updated!.*",
    "ERROR.*",
    "Could not find.*",
]

strip_lines_matching = [
    "^Using .*",
    "^\\s*$",
    "^Fetching gem metadata.*",
    "^Resolving dependencies.*",
]

max_lines = 30

[rules.filter.on_empty]
return = "ok bundle: complete"

[[rules]]
match_command = "bundle update *"
description = "bundle update - Ruby gem updater"

[rules.filter]
keep_lines_matching = [
    "Installing.*",
    "Updating.*",
    "Bundle updated!.*",
    "ERROR.*",
]

strip_lines_matching = [
    "^Using .*",
    "^\\s*$",
    "^Fetching gem metadata.*",
    "^Resolving dependencies.*",
]

max_lines = 30

[rules.filter.on_empty]
return = "ok bundle: updated"

# Inline tests
[tests]

[[tests.bundle_inst]]
name = "summarizes bundle install"
input = "Fetching gem metadata from https://rubygems.org/.........\nResolving dependencies...\nUsing rake 13.0.6\nUsing concurrent-ruby 1.1.10\nInstalling rails 7.0.4\nBundle complete! 20 Gemfile dependencies, 85 gems now installed."
expected = "Bundle complete! 20 Gemfile dependencies, 85 gems now installed."

[[tests.bundle_inst]]
name = "shows errors"
input = "Fetching gem metadata from https://rubygems.org/\nCould not find gem 'rails (~> 7.0.4)' in locally installed gems."
expected = "Could not find gem 'rails (~> 7.0.4)' in locally installed gems."
