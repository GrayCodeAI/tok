[filters.poetry-install]
description = "Compact poetry install/lock/update output — strip downloads, short-circuit when up-to-date"
match_command = "^poetry\\s+(install|lock|update)\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^  [-•] Downloading ",
  "^  [-•] Installing .* \\(",
  "^Creating virtualenv",
  "^Using virtualenv",
]
match_output = [
  { pattern = "No dependencies to install or update|No changes\\.", message = "ok (up to date)" },
]
max_lines = 30

[[tests.poetry-install]]
name = "up to date short-circuits"
input = "Installing dependencies from lock file\n\nNo dependencies to install or update"
expected = "ok (up to date)"

[[tests.poetry-install]]
name = "poetry 2.x bullet syntax short-circuits to ok"
input = "• Installing requests (2.31.0)\n• Installing certifi (2023.11.17)\n\nNo changes."
expected = "ok (up to date)"

[[tests.poetry-install]]
name = "install strips download lines"
input = "Installing dependencies from lock file\n\n  - Downloading requests-2.31.0-py3-none-any.whl (62.6 kB)\n  - Installing certifi (2023.11.17)\n  - Installing charset-normalizer (3.3.2)\n  - Installing idna (3.6)\n  - Installing urllib3 (2.1.0)\n  - Installing requests (2.31.0)\n\nWriting lock file"
expected = "Installing dependencies from lock file\nWriting lock file"
