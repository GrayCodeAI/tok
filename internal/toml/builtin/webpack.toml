[[rules]]
match_command = "webpack *"
description = "webpack - module bundler"

[rules.filter]
keep_lines_matching = [
    "ERROR.*",
    "WARNING.*",
    "Module not found.*",
    "Asset.*",
    "Entrypoint.*",
    "Time:.*",
    "Built at:.*",
    "Hash:.*",
    "WARNING in.*",
    "ERROR in.*",
]

strip_lines_matching = [
    "^\\s*\\[.*\\].*",
    "^\\s*chunk.*",
    "^\\s*\\[\\d+\\].*",
]

max_lines = 50

[rules.filter.on_empty]
return = "webpack: build successful"

[tests]
[[tests.webpack]]
name = "summarizes build"
input = """
asset main.js 1.2 MiB [emitted]
asset styles.css 100 KiB [emitted]
Entrypoint main 1.3 MiB
webpack 5.75.0 compiled successfully in 3421 ms
"""
expected = "webpack 5.75.0 compiled successfully in 3421 ms"

[[tests.webpack]]
name = "shows errors"
input = """
ERROR in ./src/index.js
Module not found: Error: Can't resolve './module'
webpack 5.75.0 compiled with 1 error in 1200 ms
"""
expected = "ERROR in ./src/index.js"
