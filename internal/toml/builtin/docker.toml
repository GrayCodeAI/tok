# Docker CLI filter
schema_version = 1

[docker_ps]
match_command = "^docker(\\s+ps)?(\\s+.*)?$"
strip_ansi = true
truncate_lines_at = 200
max_lines = 100

[docker_images]
match_command = "^docker(\\s+images)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^REPOSITORY\\s+TAG",
    "^<none>",
]
truncate_lines_at = 150
max_lines = 50

[docker_build]
match_command = "^docker(\\s+build)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^Sending build context",
    "^Step \\d+\\/\\d+ :",
    "^ ---> ",
    "^Removing intermediate container",
    "^Successfully built",
    "^Successfully tagged",
]
keep_lines_matching = [
    "Error:.*",
    "WARNING:.*",
    "COPY failed.*",
    "RUN.*failed.*",
]
on_empty = "Build completed"

[docker_compose_up]
match_command = "^docker-compose(\\s+up)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^Creating network",
    "^Creating volume",
    "^Pulling",
    "^digest:",
    "^status:",
    "^done\\.",
]
keep_lines_matching = [
    "Error:.*",
    "WARNING:.*",
    "Starting.*",
    "Attaching to.*",
]
max_lines = 50

[docker_compose_ps]
match_command = "^docker-compose(\\s+ps)?(\\s+.*)?$"
strip_ansi = true
truncate_lines_at = 200
max_lines = 50

# Inline tests for docker filters
[tests]

[[tests.docker_build]]
name = "strips build steps"
input = "Sending build context to Docker daemon  2.048MB\nStep 1/5 : FROM golang:1.21-alpine\n ---> abc123\nStep 2/5 : WORKDIR /app\n ---> Running in def456\nRemoving intermediate container def456\nStep 3/5 : COPY . .\n ---> ghi789\nSuccessfully built jkl012\nSuccessfully tagged myapp:latest"
expected = "Build completed"

[[tests.docker_build]]
name = "shows errors"
input = "Step 3/5 : COPY . .\nCOPY failed: file not found"
expected = "COPY failed: file not found"

[[tests.docker_ps]]
name = "truncates long output"
input = "CONTAINER ID   IMAGE   STATUS   PORTS   NAMES\nabc123   myapp:latest   Up 2 hours   8080->80   web\n"
expected = "CONTAINER ID   IMAGE   STATUS   PORTS   NAMES\nabc123   myapp:latest   Up 2 hours   8080->80   web"
