[[rules]]
match_command = "jest *"
description = "jest - JavaScript test runner"

[rules.filter]
# Keep only failing tests and summary
keep_lines_matching = [
    "FAIL.*",
    "✕.*",
    "●.*",
    "Test Suites:.*",
    "Tests:.*",
    "Snapshots:.*",
    "Time:.*",
    "Ran all test suites.*",
]

# Strip passing test noise
strip_lines_matching = [
    "^\\s*✓.*",
    "^\\s*√.*",
    "^\\s*PASS.*",
    "^\\s*\\[32m",
    "^\\s*console\\.log",
    "^\\s*console\\.warn",
]

max_lines = 100

[rules.filter.on_empty]
return = "All tests passed."

# Inline tests
[tests]

[[tests.jest]]
name = "hides passing tests"
input = " PASS  tests/basic.test.js\n  ✓ basic render (3 ms)\n  ✓ basic state (2 ms)\n PASS  tests/api.test.js\n  ✓ fetch data (5 ms)\n\nTest Suites: 2 passed, 2 total\nTests:       3 passed, 3 total\nTime:        0.789 s"
expected = "Test Suites: 2 passed, 2 total"

[[tests.jest]]
name = "shows failures"
input = " FAIL  tests/login.test.js (0.543 s)\n  ✕ should login (12 ms)\n  ● should login\n\n    TypeError: Cannot read properties of undefined\n\n      12 |       expect(result.user).toBeDefined();\n      13 |     });\n      at Object.login (tests/login.test.js:12:21)\n\n PASS  tests/home.test.js\n  ✓ should render home (5 ms)\n\nTest Suites: 1 failed, 1 passed, 2 total\nTests:       1 failed, 1 passed, 2 total\nTime:        0.789 s, estimated 1 s"
expected = "FAIL: tests/login.test.js (0.543 s)\n\nTest Suites: 1 failed, 1 passed, 2 total\nTests:       1 failed, 1 passed, 2 total"
[[tests.jest]]
name = "shows test suite failures"
input = " FAIL  tests/auth.test.js\n  ● should validate token\n    expect(received).toBeTruthy()\n    Received: false\n      at Object.<anonymous> (tests/auth.test.js:25:18)\nTest Suites: 1 failed, 3 passed, 4 total\nTests:       1 failed, 12 passed, 13 total"
expected = "FAIL: tests/auth.test.js › should validate token\nTest Suites: 1 failed, 3 passed, 4 total\nTests:       1 failed, 12 passed, 13 total"
