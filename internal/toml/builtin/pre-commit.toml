[filters.pre-commit]
description = "Compact pre-commit output"
match_command = "^pre-commit\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\[INFO\\] Installing environment",
  "^\\[INFO\\] Once installed this environment will be reused",
  "^\\[INFO\\] This may take a few minutes",
  "^\\s*$",
]
max_lines = 40

[[tests.pre-commit]]
name = "strips INFO install noise, keeps hook results"
input = "[INFO] Installing environment for https://github.com/psf/black.\n[INFO] Once installed this environment will be reused.\n[INFO] This may take a few minutes...\nTrim Trailing Whitespace.................................................Passed\nFix End of Files.........................................................Passed\nCheck Yaml...............................................................Failed\n- hook id: check-yaml\n- exit code: 1"
expected = "Trim Trailing Whitespace.................................................Passed\nFix End of Files.........................................................Passed\nCheck Yaml...............................................................Failed\n- hook id: check-yaml\n- exit code: 1"

[[tests.pre-commit]]
name = "all passed — no INFO noise"
input = "[INFO] Installing environment for https://github.com/pre-commit/mirrors-isort.\n[INFO] Once installed this environment will be reused.\nisort....................................................................Passed\nblack....................................................................Passed"
expected = "isort....................................................................Passed\nblack....................................................................Passed"
