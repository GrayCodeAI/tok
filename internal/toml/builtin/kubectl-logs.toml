[[rules]]
match_command = "kubectl logs *"
description = "kubectl logs - pod logs"

[rules.filter]
# Keep errors and warnings
keep_lines_matching = [
    "(?i)error.*",
    "(?i)warn.*",
    "(?i)fatal.*",
    "(?i)panic.*",
    "(?i)exception.*",
    "(?i)traceback.*",
]

# Deduplicate repeated lines
max_lines = 100

[rules.filter.on_empty]
return = "kubectl logs: no output"

# Inline tests
[tests]

[[tests.kubectl_logs]]
name = "filters verbose logs"
input = "2024-01-15T10:00:00Z INFO  Starting application\n2024-01-15T10:00:01Z INFO  Loading configuration\n2024-01-15T10:00:02Z WARN  Config key 'legacy' deprecated\n2024-01-15T10:00:03Z ERROR Failed to connect to database\n  at db.go:45\n  at main.go:12\n2024-01-15T10:00:04Z INFO  Retrying connection..."
expected = "WARN  Config key 'legacy' deprecated\nERROR Failed to connect to database"
