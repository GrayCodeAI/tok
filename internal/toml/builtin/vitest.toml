[[rules]]
match_command = "vitest *"
description = "vitest - fast Vite-native test runner"

[rules.filter]
keep_lines_matching = [
    "FAIL.*",
    "×.*",
    "Test Files.*",
    "Tests.*",
    "Duration.*",
]

strip_lines_matching = [
    "^\\s*✓.*",
    "^\\s*√.*",
    "^\\s*PASS.*",
    "^\\s*stdout.*",
]

max_lines = 100

[rules.filter.on_empty]
return = "All tests passed."

# Inline tests
[tests]

[[tests.vitest]]
name = "hides passing tests"
input = " RUN  v1.0.0 /project\n\n ✓ tests/basic.test.ts (2)\n   ✓ basic feature\n   ✓ edge case\n\n Test Files  1 passed (1)\n      Tests  2 passed (2)\n   Start at  10:00:00\n   Duration  500ms"
expected = "Test Files  1 passed (1)"

[[tests.vitest]]
name = "shows failures"
input = " RUN  v1.0.0 /project\n\n ❯ tests/login.test.ts (2)\n   ❯ login (2)\n     × should authenticate\n     ✓ should handle error\n\n⎯⎯⎯⎯⎯⎯⎯ Failed Tests 1 ⎯⎯⎯⎯⎯⎯⎯\n\n FAIL  tests/login.test.ts > login > should authenticate\nAssertionError: expected true to be false\n ❯ tests/login.test.ts:12:15\n\n Test Files  1 failed (1)\n      Tests  1 failed | 1 passed (2)\n   Start at  10:00:00\n   Duration  500ms"
expected = "FAIL: tests/login.test.ts > login > should authenticate\n\nTest Files  1 failed (1)\nTests  1 failed | 1 passed (2)"
[[tests.vitest]]
name = "shows type errors"
input = " ❯ tests/type.test.ts (3)\n   ✓ should work\n   × should type check\n   ⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯ FAILED ⎯⎯⎯⎯⎯⎯⎯⎯⎯\n FAIL  tests/type.test.ts > should type check\nAssertionError: expected 1 to be 2\n ❯ tests/type.test.ts:10:15\nTest Files  1 failed | 2 passed (3)\n     Tests  1 failed | 5 passed (6)"
expected = "FAIL: tests/type.test.ts > should type check\nTest Files  1 failed | 2 passed (3)\nTests  1 failed | 5 passed (6)"
