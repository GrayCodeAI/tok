[[rules]]
match_command = "curl *"
description = "curl - HTTP client"

[rules.filter]
# Strip progress bars and transfer stats
strip_lines_matching = [
    "^\\s*%\\s+Total",
    "^\\s*\\d+\\s+\\d+\\s+\\d+\\s+\\d+",
    "^\\s*\\d+:\\d+:\\d+",
    "^\\s*100\\s+\\d+",
    "^\\s*\\*\\s+",
    "^>\\s+",
    "^<\\s+",
]

# Truncate verbose headers
replace = [
    { from = "^HTTP/[0-9.]+ .{200,}", to = "HTTP response (truncated)" },
    { from = "^[{\\[].{1000,}", to = "(large response body, truncated)" },
]

# Max output size
max_lines = 300

[rules.filter.on_empty]
return = "curl: no output"
[tests]
[[tests.curl]]
name = "compact response"
input = "{\n  \"status\": \"success\",\n  \"data\": {\n    \"id\": 12345,\n    \"name\": \"test\"\n  }\n}\n% Total    % Received   % Xferd  Average Speed   Time    Time     Time  Current\n                               Dload  Upload   Total   Spent    Left  Speed\n100  1234  100  1234    0     0   5678      0 --:--:-- --:--:-- --:--:--  5678"
expected = "{\"status\":\"success\",\"data\":{\"id\":12345,\"name\":\"test\"}}"
