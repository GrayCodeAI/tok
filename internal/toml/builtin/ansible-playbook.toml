# Ansible Playbook CLI filter
schema_version = 1

[ansible_playbook]
match_command = "^ansible-playbook\\b"
strip_ansi = true
strip_lines_matching = [
    "^\\s*$",
    "^ok: \\[",
    "^skipping: \\[",
]
max_lines = 60

[[tests.ansible_playbook]]
name = "strips ok and skipping lines, keeps changed and failures"
input = """
PLAY [all] *********************************************************************

TASK [Gathering Facts] *********************************************************
ok: [web01]
ok: [web02]

TASK [Install nginx] ***********************************************************
changed: [web01]
skipping: [web02]

PLAY RECAP *********************************************************************
web01                      : ok=2    changed=1    unreachable=0    failed=0
web02                      : ok=1    changed=0    unreachable=0    failed=0
"""
expected = "PLAY [all] *********************************************************************\nTASK [Gathering Facts] *********************************************************\nTASK [Install nginx] ***********************************************************\nchanged: [web01]\nPLAY RECAP *********************************************************************\nweb01                      : ok=2    changed=1    unreachable=0    failed=0\nweb02                      : ok=1    changed=0    unreachable=0    failed=0"

[[tests.ansible_playbook]]
name = "failed task preserved"
input = "TASK [Start service] ***\nfailed: [web01] => {\"msg\": \"Service not found\"}\nPLAY RECAP ***\nweb01 : ok=1 failed=1"
expected = "TASK [Start service] ***\nfailed: [web01] => {\"msg\": \"Service not found\"}\nPLAY RECAP ***\nweb01 : ok=1 failed=1"

[tests]
[[tests.ansible_playbook]]
name = "summarizes playbook run"
input = """
PLAY [Deploy Web Server] ********************************************************
TASK [Gathering Facts] **********************************************************
ok: [server1]
TASK [Install nginx] ************************************************************
changed: [server1]
TASK [Start nginx] **************************************************************
changed: [server1]

PLAY RECAP *********************************************************************
server1    : ok=3    changed=2    unreachable=0    failed=0
"""
expected = """
PLAY RECAP
server1    : ok=3    changed=2    unreachable=0    failed=0
"""

[[tests.ansible_playbook]]
name = "shows failures"
input = """
TASK [Install nginx] ************************************************************
fatal: [server1]: FAILED! => {"changed": false, "msg": "Package not found"}

PLAY RECAP *********************************************************************
server1    : ok=1    changed=0    unreachable=0    failed=1
"""
expected = """
FAILED: server1 - Package not found

PLAY RECAP
server1    : ok=1    changed=0    unreachable=0    failed=1
"""
