[[rules]]
match_command = "terraform apply *"
description = "terraform apply - apply infrastructure changes"

[rules.filter]
keep_lines_matching = [
    "Apply complete!.*",
    "Changes:.*",
    "Outputs:.*",
    "Error:.*",
    "Warning:.*",
    "Plan:.*",
    "  \\+.*",
    "  -.*",
    "  ~.*",
    "  #.*",
]

strip_lines_matching = [
    "^\\s*\\[.*\\].*",
    "^\\s*Refreshing state.*",
    "^\\s*Read.*complete.*",
]

max_lines = 100

[rules.filter.on_empty]
return = "terraform apply: completed"

# Inline tests
[tests]

[[tests.terraform_apply]]
name = "summarizes apply output"
input = "Acquiring state lock...\n\nTerraform used the selected providers to generate the following execution plan.\nResource actions are indicated with the following symbols:\n  + create\n  ~ update in-place\n\nPlan: 3 to add, 1 to change, 0 to destroy.\n\naws_s3_bucket.data: Creating...\naws_s3_bucket.data: Creation complete after 2s [id=my-bucket]\naws_instance.web: Creating...\naws_instance.web: Still creating... [10s elapsed]\naws_instance.web: Creation complete after 15s [id=i-1234567890abcdef]\n\nApply complete! Resources: 3 added, 1 changed, 0 destroyed."
expected = "Apply complete! Resources: 3 added, 1 changed, 0 destroyed."

[[tests.terraform_apply]]
name = "shows errors"
input = "Error: Error creating S3 bucket: AccessDenied\n\n  on main.tf line 5, in resource \"aws_s3_bucket\" \"data\":\n   5: resource \"aws_s3_bucket\" \"data\" {"
expected = "Error: Error creating S3 bucket: AccessDenied"
