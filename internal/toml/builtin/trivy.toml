[[rules]]
match_command = "trivy *"
description = "trivy - security vulnerability scanner"

[rules.filter]
keep_lines_matching = [
    "HIGH.*",
    "CRITICAL.*",
    "MEDIUM.*",
    "LOW.*",
    "Total:.*",
    "Summary:.*",
    "\\d+ \\(HIGH\\).*",
    "\\d+ \\(CRITICAL\\).*",
]

# Strip scan progress
strip_lines_matching = [
    "^\\s*\\d{4}.*Scanning.*",
    "^\\s*Detecting.*",
    "^\\s*Analyzing.*",
]

max_lines = 100

[rules.filter.on_empty]
return = "trivy: no vulnerabilities found"

# Inline tests
[tests]

[[tests.trivy]]
name = "summarizes vulnerabilities"
input = """
2024-01-15T10:00:00Z    INFO    Detected OS: alpine
2024-01-15T10:00:00Z    INFO    Detected Library: 3.18.4

app (alpine 3.18.4)
Total: 5 (UNKNOWN: 0, LOW: 2, MEDIUM: 2, HIGH: 1, CRITICAL: 0)

+-------------------+------------------+----------+-------------------+
|     LIBRARY       | VULNERABILITY ID  | SEVERITY | INSTALLED VERSION |
+-------------------+------------------+----------+-------------------+
| openssl           | CVE-2023-5363    | HIGH     | 3.1.4.3           |
| busybox           | CVE-2023-42364   | LOW      | 1.36.1            |
+-------------------+------------------+----------+-------------------+
"""
expected = """
Total: 5 (UNKNOWN: 0, LOW: 2, MEDIUM: 2, HIGH: 1, CRITICAL: 0)
HIGH: CVE-2023-5363 openssl
LOW: CVE-2023-42364 busybox
"""

[[tests.trivy]]
name = "no vulnerabilities"
input = """
2024-01-15T10:00:00Z    INFO    Detected OS: alpine

app (alpine 3.18.4)
Total: 0 (UNKNOWN: 0, LOW: 0, MEDIUM: 0, HIGH: 0, CRITICAL: 0)
"""
expected = "No vulnerabilities found"
