[[rules]]
match_command = "eslint *"
description = "eslint - JavaScript linter"

[rules.filter]
# Keep error/warning lines
keep_lines_matching = [
    ".*error.*",
    ".*warning.*",
    ".*problem.*",
    "✖.*",
    "\\d+ error.*",
    "\\d+ warning.*",
]

# Strip success messages
strip_lines_matching = [
    "^\\s*✓.*",
    "^\\s*✔.*",
    "no problems found",
]

max_lines = 50

[rules.filter.on_empty]
return = "ESLint: no problems found"

# Inline tests
[tests]

[[tests.eslint]]
name = "groups errors by rule"
input = "/path/to/file1.js\n  1:1  error  'require' is not defined    node/no-unpublished-require\n  2:1  error  'describe' is not defined   jest/no-disabled-tests\n\n/path/to/file2.js\n  5:1  error  Unexpected console statement  no-console\n  6:1  error  'require' is not defined      node/no-unpublished-require\n\n✖ 4 problems (4 errors, 0 warnings)"
expected = "/path/to/file1.js: 2 errors\n/path/to/file2.js: 2 errors\n\n4 errors, 0 warnings"

[[tests.eslint]]
name = "clean output"
input = "All files passed linting!"
expected = "All files passed linting!"
