# Turbo - Monorepo build system filter
# https://turbo.build

[turbo-run]
match_command = "^turbo run "
mode = "minimal"
description = "Turbo monorepo build output with compact logs"

# Strip task execution details
strip_lines_matching = [
  "^\\[\\d+/\\d+\\]",
  "^>>> FULL TURBO",
  "^  cache hit",
  "^  cache miss",
]

# Extract important build information
output_patterns = [
  "^• Packages in scope:",
  "^• Running",
  "^✓ Built",
  "^✗ Failed",
  "^ERROR",
  "^Tasks:",
  "^Cached:",
  "^Total:",
]

compact_repeated_lines = true
max_repeated_context = 5

[turbo-build]
match_command = "^turbo build"
strip_lines_matching = [
  "^  └─",
  "^  ├─",
  "^Hash:",
  "^Cached outputs:",
]
output_patterns = [
  "^Building",
  "^✓",
  "^ERROR",
  "^warning:",
]

[turbo-prune]
match_command = "^turbo prune"
output_patterns = [
  "^Generating pruned monorepo",
  "^  - Added",
  "^  - Removed",
  "^✓ Prune complete",
]

[turbo-daemon]
match_command = "^turbo daemon"
output_patterns = [
  "^Daemon",
  "^Running on port",
  "^error:",
]
strip_lines_matching = ["^\\[TRACE\\]", "^\\[DEBUG\\]"]
