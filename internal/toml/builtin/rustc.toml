[[rules]]
match_command = "rustc *"
description = "rustc - Rust compiler"

[rules.filter]
# Keep only error and warning lines
keep_lines_matching = [
    ".*error\\[E[0-9]+\\].*",
    ".*warning.*",
    ".*-->.*",
    "^\\s*\\|.*",
]

# Strip verbose diagnostics
strip_lines_matching = [
    "^\\s*= help:.*",
    "^\\s*= note:.*",
]

max_lines = 50

[rules.filter.on_empty]
return = "rustc: compilation successful"
[tests]
[[tests.rustc]]
name = "shows compilation errors"
input = "error[E0425]: cannot find function `foo` in this scope\n  --> src/main.rs:10:5\n   |\n10 |     foo();\n   |     ^^^ not found in this scope\n\nwarning: unused variable: `x`\n  --> src/main.rs:5:9\n   |\n5  |     let x = 5;\n   |         ^ help: if this is intentional, prefix it with an underscore: `_x`\n\nerror: aborting due to previous error; 1 warning emitted"
expected = "error[E0425]: cannot find function `foo` in this scope\nwarning: unused variable: `x`"
