[filters.helm]
description = "Compact helm output"
match_command = "^helm\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^W\\d{4}",
]
truncate_lines_at = 120
max_lines = 40

[[tests.helm]]
name = "strips blank lines, preserves release info"
input = "NAME: my-release\nLAST DEPLOYED: Mon Jan 15 10:30:00 2024\nNAMESPACE: default\nSTATUS: deployed\nREVISION: 3\n\nNOTES:\nApplication is running."
expected = "NAME: my-release\nLAST DEPLOYED: Mon Jan 15 10:30:00 2024\nNAMESPACE: default\nSTATUS: deployed\nREVISION: 3\nNOTES:\nApplication is running."

[[tests.helm]]
name = "strips glog W-prefix warnings"
input = "W0115 10:30:00 warning message from internal\nNAME: my-chart\nSTATUS: deployed"
expected = "NAME: my-chart\nSTATUS: deployed"

[tests]
[[tests.helm]]
name = "summarizes install"
input = "NAME: my-release\nLAST DEPLOYED: Mon Apr  7 10:00:00 2026\nNAMESPACE: default\nSTATUS: deployed\nREVISION: 1\nNOTES:\n1. Get the application URL by running these commands:\n  export POD_NAME=$(kubectl get pods ...)"
expected = "NAME: my-release\nSTATUS: deployed\nREVISION: 1"

[[tests.helm]]
name = "shows errors"
input = "Error: INSTALLATION FAILED: unable to build kubernetes objects\nfrom release manifest: unable to recognize \"\": no matches for kind \"Deployment\""
expected = "Error: INSTALLATION FAILED"
