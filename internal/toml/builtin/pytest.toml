# Pytest CLI filter
schema_version = 1

[pytest]
match_command = "^pytest(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^=+ test session starts =+",
    "^=+",
    "^\\s*$",
    "^collecting \\d+ items",
    "^\\x1b\\[",
]
keep_lines_matching = [
    "PASSED.*",
    "FAILED.*",
    "ERROR.*",
    "test_.*",
    "passed",
    "failed",
    "error",
    "xfailed",
    "skipped",
    "warnings",
    "=== .*failed",
    "--- FAILURES",
]
head = 30
tail = 50
max_lines = 100

[pytest_v]
match_command = "^pytest\\s+(-v|--verbose)(\\s+.*)?$"
strip_ansi = true
keep_lines_matching = [
    "PASSED.*",
    "FAILED.*",
    "ERROR.*",
    "test_.*::",
    "passed",
    "failed",
    "error",
]
tail = 100
max_lines = 200

# Inline tests
[tests]

[[tests.pytest]]
name = "shows only failures"
input = """
============================= test session starts ==============================
platform linux -- Python 3.11.0
collected 42 items

tests/test_basic.py::test_one PASSED                                     [ 2%]
tests/test_basic.py::test_two PASSED                                     [ 5%]
tests/test_edge.py::test_edge FAILED                                     [ 7%]
tests/test_edge.py::test_crash FAILED                                    [ 9%]

=================================== FAILURES ===================================
__________________________________ test_edge ___________________________________

    def test_edge():
>       assert 1 == 2
E       assert 1 == 2

tests/test_edge.py:10: AssertionError
__________________________________ test_crash __________________________________

    def test_crash():
>       raise ValueError("crash!")
E       ValueError: crash!

tests/test_edge.py:15: ValueError
-------------------- generated xml file: /tmp/report.xml ---------------------
=========================== short test summary info ============================
FAILED tests/test_edge.py::test_edge - assert 1 == 2
FAILED tests/test_edge.py::test_crash - ValueError: crash!
========================= 2 failed, 40 passed in 1.23s =========================
"""
expected = """
FAILED: tests/test_edge.py::test_edge - assert 1 == 2
FAILED: tests/test_edge.py::test_crash - ValueError: crash!
"""

[[tests.pytest]]
name = "all passing shows summary"
input = """
============================= test session starts ==============================
platform linux -- Python 3.11.0
collected 10 items

tests/test_a.py::test_one PASSED                                     [ 10%]
tests/test_a.py::test_two PASSED                                     [ 20%]
tests/test_b.py::test_three PASSED                                   [ 100%]

============================= 10 passed in 0.45s ==============================
"""
expected = "10 passed in 0.45s"
