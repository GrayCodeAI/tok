# Pytest CLI filter
schema_version = 1

[pytest]
match_command = "^pytest(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^=+ test session starts =+",
    "^=+",
    "^\\s*$",
    "^collecting \\d+ items",
    "^\\x1b\\[",
]
keep_lines_matching = [
    "PASSED.*",
    "FAILED.*",
    "ERROR.*",
    "test_.*",
    "passed",
    "failed",
    "error",
    "xfailed",
    "skipped",
    "warnings",
    "=== .*failed",
    "--- FAILURES",
]
head = 30
tail = 50
max_lines = 100

[pytest_v]
match_command = "^pytest\\s+(-v|--verbose)(\\s+.*)?$"
strip_ansi = true
keep_lines_matching = [
    "PASSED.*",
    "FAILED.*",
    "ERROR.*",
    "test_.*::",
    "passed",
    "failed",
    "error",
]
tail = 100
max_lines = 200

# Inline tests
[tests]

[[tests.pytest]]
name = "shows only failures"
input = "============================= test session starts ==============================\nplatform linux -- Python 3.11.0\ncollected 42 items\n\ntests/test_basic.py::test_one PASSED                                     [ 2%]\ntests/test_basic.py::test_two PASSED                                     [ 5%]\ntests/test_edge.py::test_edge FAILED                                     [ 7%]\ntests/test_edge.py::test_crash FAILED                                    [ 9%]\n\n=================================== FAILURES ===================================\n__________________________________ test_edge ___________________________________\n\n    def test_edge():\n>       assert 1 == 2\nE       assert 1 == 2\n\ntests/test_edge.py:10: AssertionError\n__________________________________ test_crash __________________________________\n\n    def test_crash():\n>       raise ValueError(\"crash!\")\nE       ValueError: crash!\n\ntests/test_edge.py:15: ValueError\n-------------------- generated xml file: /tmp/report.xml ---------------------\n=========================== short test summary info ============================\nFAILED tests/test_edge.py::test_edge - assert 1 == 2\nFAILED tests/test_edge.py::test_crash - ValueError: crash!\n========================= 2 failed, 40 passed in 1.23s ========================="
expected = "FAILED: tests/test_edge.py::test_edge - assert 1 == 2\nFAILED: tests/test_edge.py::test_crash - ValueError: crash!"

[[tests.pytest]]
name = "all passing shows summary"
input = "============================= test session starts ==============================\nplatform linux -- Python 3.11.0\ncollected 10 items\n\ntests/test_a.py::test_one PASSED                                     [ 10%]\ntests/test_a.py::test_two PASSED                                     [ 20%]\ntests/test_b.py::test_three PASSED                                   [ 100%]\n\n============================= 10 passed in 0.45s =============================="
expected = "10 passed in 0.45s"
