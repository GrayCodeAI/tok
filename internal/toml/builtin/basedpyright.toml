[filters.basedpyright]
description = "Compact basedpyright type checker output — strip blank lines, keep errors"
match_command = "^basedpyright\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^Searching for source files",
  "^Found \\d+ source file",
  "^Pyright \\d+\\.\\d+",
  "^basedpyright \\d+\\.\\d+",
]
max_lines = 50
on_empty = "basedpyright: ok"

[[tests.basedpyright]]
name = "strips noise, keeps errors and summary"
input = "basedpyright 1.22.0\nSearching for source files\nFound 42 source files\n\n/home/user/app/main.py\n  /home/user/app/main.py:10:5 - error: \"foo\" is not defined (reportUndefinedVariable)\n  /home/user/app/main.py:25:1 - error: Type \"str\" is not assignable to type \"int\" (reportAssignmentType)\n\n/home/user/app/utils.py\n  /home/user/app/utils.py:8:9 - warning: Variable \"x\" is not accessed (reportUnusedVariable)\n\n3 errors, 1 warning, 0 informations"
expected = "/home/user/app/main.py\n  /home/user/app/main.py:10:5 - error: \"foo\" is not defined (reportUndefinedVariable)\n  /home/user/app/main.py:25:1 - error: Type \"str\" is not assignable to type \"int\" (reportAssignmentType)\n/home/user/app/utils.py\n  /home/user/app/utils.py:8:9 - warning: Variable \"x\" is not accessed (reportUnusedVariable)\n3 errors, 1 warning, 0 informations"

[[tests.basedpyright]]
name = "clean output"
input = "basedpyright 1.22.0\nSearching for source files\nFound 10 source files\n\n0 errors, 0 warnings, 0 informations"
expected = "0 errors, 0 warnings, 0 informations"

[[tests.basedpyright]]
name = "empty input returns on_empty message"
input = ""
expected = "basedpyright: ok"
[tests]
[[tests.basedpyright]]
name = "groups type errors"
input = "/workspace/src/app.py:10:5 - error: Cannot assign to attribute 'name'\n    Type 'int' is not assignable to type 'str'\n/workspace/src/app.py:15:12 - warning: \"x\" is not accessed\n/workspace/src/utils.py:5:1 - error: Import 'missing_module' could not be resolved\n3 errors, 0 warnings, 0 informations"
expected = "/workspace/src/app.py:10:5 - error: Cannot assign to attribute 'name'\n/workspace/src/app.py:15:12 - warning: \"x\" is not accessed\n/workspace/src/utils.py:5:1 - error: Import 'missing_module' could not be resolved\n3 errors, 0 warnings"
