[filters.apt]
description = "Compact apt/dpkg output — strip verbose messages"
match_command = "^(apt|apt-get|dpkg)\\b"
strip_ansi = true

[filters.apt.strip_lines_matching]
patterns = [
  "^\\s*$",
  "^Reading package lists",
  "^Building dependency tree",
  "^Reading state information",
  "^Need to get",
  "^After this operation",
  "^Do you want to continue",
  "^Get:\\d+",
  "^Hit:\\d+",
  "^Ign:\\d+",
  "^Err:\\d+",
  "^Fetched",
  "^Setting up ",
  "^Processing triggers",
]

[filters.apt.max_lines]
value = 30

[[tests.apt]]
name = "apt install compact"
input = "Reading package lists... Done\nBuilding dependency tree... Done\nReading state information... Done\nThe following NEW packages will be installed:\n  nginx nginx-common nginx-core\n0 upgraded, 3 newly installed, 0 to remove and 0 not upgraded.\nNeed to get 614 kB of archives.\nAfter this operation, 2,621 kB of additional disk space will be used.\nGet:1 http://archive.ubuntu.com/ubuntu jammy/main amd64 nginx amd64 1.18.0-6.1ubuntu1 [3,978 B]\nGet:2 http://archive.ubuntu.com/ubuntu jammy/main amd64 nginx-common all 1.18.0-6.1ubuntu1 [40.7 kB]\nGet:3 http://archive.ubuntu.com/ubuntu jammy/main amd64 nginx-core amd64 1.18.0-6.1ubuntu1 [570 kB]\nFetched 614 kB in 1s (614 kB/s)\nSelecting previously unselected package nginx-common.\n(Reading database ... 200000 files and directories currently installed.)\nPreparing to unpack .../nginx-common_1.18.0-6.1ubuntu1_all.deb ...\nUnpacking nginx-common (1.18.0-6.1ubuntu1) ...\nSetting up nginx-common (1.18.0-6.1ubuntu1) ...\nProcessing triggers for systemd (249.11-0ubuntu3.12) ..."
expected = "nginx"

[[tests.apt]]
name = "empty input"
input = ""
expected = ""
