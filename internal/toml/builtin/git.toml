# Git CLI filter with inline tests
schema_version = 1

[git_status]
match_command = "^git(\\s+status)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^\\s+use \".*",
    "^\\s*$",
    "^\\x1b\\[",
]
keep_lines_matching = [
    "^On branch .*",
    "Changes to be committed:",
    "Changes not staged for commit:",
    "Untracked files:",
    "new file:.*",
    "modified:.*",
    "deleted:.*",
    "renamed:.*",
    "copied:.*",
    "unmerged:.*",
    "both modified:.*",
]
head = 50
max_lines = 100

[git_log]
match_command = "^git(\\s+log)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^commit [a-f0-9]+",
    "^Author: .*",
    "^Date: .*",
    "^    $",
    "^\\x1b\\[",
]
keep_lines_matching = [
    "^    [^\\s]",
]
head = 30
max_lines = 50

[git_diff]
match_command = "^git(\\s+diff)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^index [a-f0-9]+\\.{2}[a-f0-9]+",
    "^\\x1b\\[",
]
keep_lines_matching = [
    "^diff --git",
    "^--- a/.*",
    "^\\+\\+\\+ b/.*",
    "^@@ .* @@",
    "^[+-]",
]
head = 100
max_lines = 200

[git_branch]
match_command = "^git(\\s+branch)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = [
    "^\\x1b\\[",
    "^\\s*$",
]
max_lines = 50

[git_remote]
match_command = "^git(\\s+remote)?(\\s+.*)?$"
strip_ansi = true
strip_lines_matching = ["^\\x1b\\["]
max_lines = 20

# Inline tests for git filters
[tests]

[[tests.git_status]]
name = "clean working tree"
input = """
On branch main
Your branch is up to date with 'origin/main'.

nothing to commit, working tree clean
"""
expected = """
On branch main
nothing to commit, working tree clean
"""

[[tests.git_status]]
name = "modified files"
input = """
On branch main
Changes not staged for commit:
  (use "git add <file>..." to update what will be committed)
  (use "git restore <file>..." to discard changes in working directory)
	modified:   README.md
	modified:   src/main.go

no changes added to commit (use "git add" and/or "git commit -a")
"""
expected = """
On branch main
Changes not staged for commit:
	modified:   README.md
	modified:   src/main.go
"""

[[tests.git_status]]
name = "untracked files"
input = """
On branch develop
Untracked files:
  (use "git add <file>..." to include in what will be committed)
	new-feature.go
	test.txt

nothing added to commit but untracked files present (use "git add" to track)
"""
expected = """
On branch develop
Untracked files:
	new-feature.go
	test.txt
"""

[[tests.git_log]]
name = "strips metadata"
input = """
commit abc123def456
Author: John Doe <john@example.com>
Date:   Mon Apr 7 12:00:00 2026 -0700

    Add new feature
    
commit 789ghi012jkl
Author: Jane Smith <jane@example.com>
Date:   Sun Apr 6 15:30:00 2026 -0700

    Fix bug in parser
"""
expected = """
    Add new feature
    Fix bug in parser
"""

[[tests.git_diff]]
name = "shows additions and deletions"
input = """
diff --git a/file.txt b/file.txt
index abc123..def456 100644
--- a/file.txt
+++ b/file.txt
@@ -1,3 +1,4 @@
 Hello
-World
+Universe
+New line
"""
expected = """
diff --git a/file.txt b/file.txt
--- a/file.txt
+++ b/file.txt
@@ -1,3 +1,4 @@
 Hello
-World
+Universe
+New line
"""

[[tests.git_branch]]
name = "strips empty lines"
input = """
  feature-branch
* main

  develop
"""
expected = """
  feature-branch
* main
  develop
"""

[[tests.git_remote]]
name = "lists remotes"
input = """
origin
upstream
"""
expected = """
origin
upstream
"""
