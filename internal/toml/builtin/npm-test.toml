[[rules]]
match_command = "npm test *"
description = "npm test - run test suite"

[rules.filter]
keep_lines_matching = [
    "FAIL.*",
    "Error.*",
    "✗.*",
    "×.*",
    "Test Suites:.*",
    "Tests:.*",
    "Snapshots:.*",
    "Time:.*",
]

strip_lines_matching = [
    "^\\s*✓.*",
    "^\\s*√.*",
    "^\\s*PASS.*",
    "^\\s*>.*",
    "^\\s*\\[.*\\].*",
]

max_lines = 80

[rules.filter.on_empty]
return = "All tests passed."

# Inline tests
[tests]

[[tests.npm_test]]
name = "shows test failures"
input = "> myapp@1.0.0 test\n> jest\n\n FAIL  tests/app.test.js\n  ✕ should render correctly (12 ms)\n  ✓ should handle input (3 ms)\n\n  ● should render correctly\n\n    expect(received).toBe(expected)\n\n    Expected: \"Hello\"\n    Received: undefined\n\n      at Object.<anonymous> (tests/app.test.js:10:16)\n\n PASS  tests/utils.test.js\n  ✓ should add numbers (2 ms)\n  ✓ should divide numbers (1 ms)\n\nTest Suites: 1 failed, 1 passed, 2 total\nTests:       1 failed, 3 passed, 4 total\nTime:        1.234 s"
expected = "FAIL: tests/app.test.js › should render correctly\n\nTest Suites: 1 failed, 1 passed, 2 total\nTests:       1 failed, 3 passed, 4 total"

[[tests.npm_test]]
name = "all passing summary"
input = "> myapp@1.0.0 test\n> jest\n\n PASS  tests/app.test.js\n  ✓ should render correctly (3 ms)\n  ✓ should handle input (2 ms)\n PASS  tests/utils.test.js\n  ✓ should add numbers (1 ms)\n\nTest Suites: 2 passed, 2 total\nTests:       4 passed, 4 total\nTime:        0.567 s"
expected = "Test Suites: 2 passed, 2 total"
