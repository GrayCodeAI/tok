version: 2

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: tok
    main: ./cmd/tok
    binary: tok
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - "386"
    goarm:
      - "7"
    ldflags:
      - -s -w
      - -X github.com/GrayCodeAI/tok/internal/version.Version={{.Version}}
    ignore:
      - goos: windows
        goarch: arm64
      - goos: freebsd
        goarch: "386"
      - goos: freebsd
        goarch: arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    builds:
      - tok
    formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - docs/examples/*.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^style:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "⚡ Performance"
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "📝 Documentation"
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: "🔧 Other"
      order: 999

release:
  github:
    owner: GrayCodeAI
    name: tok
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## Tok v{{ .Version }}
    
    Token-aware CLI proxy with 31-layer compression pipeline.
    
    ### Installation
    
    ```bash
    # Homebrew
    brew install GrayCodeAI/tap/tok
    
    # Quick install
    curl -fsSL https://raw.githubusercontent.com/GrayCodeAI/tok/main/scripts/install.sh | bash
    
    # Go install
    go install github.com/GrayCodeAI/tok/cmd/tok@v{{ .Version }}
    ```
  footer: |
    
    **Full Changelog**: https://github.com/GrayCodeAI/tok/compare/{{ .PreviousTag }}...{{ .Tag }}
    
    ---
    ⭐ Star us on GitHub if Tok helps you save tokens!

brews:
  - repository:
      owner: GrayCodeAI
      name: homebrew-tok
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/GrayCodeAI/tok"
    description: "Token-aware CLI proxy with 31-layer compression pipeline for AI coding assistants"
    license: "MIT"
    install: |
      bin.install "tok"
    test: |
      system "#{bin}/tok", "--version"
    caveats: |
      To get started:
        tok init -g        # Set up for Claude Code
        tok doctor         # Verify installation

nfpms:
  - id: packages
    package_name: tok
    vendor: GrayCode AI
    homepage: https://github.com/GrayCodeAI/tok
    maintainer: GrayCode AI <maintainers@graycode.ai>
    description: Token-aware CLI proxy with 31-layer compression pipeline for AI coding assistants
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/tok/LICENSE
      - src: README.md
        dst: /usr/share/doc/tok/README.md
