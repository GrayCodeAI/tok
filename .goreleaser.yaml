# GoReleaser configuration for TokMan
# https://goreleaser.com

project_name: tokman

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: tokman
    main: ./cmd/tokman
    binary: tokman
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "6"
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    ignore:
      - goos: windows
        goarch: arm64

  - id: tokman-server
    main: ./cmd/tokman-server
    binary: tokman-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: tokman
    builds:
      - tokman
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - config/tokman.toml

  - id: tokman-server
    builds:
      - tokman-server
    name_template: "{{ .ProjectName }}-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: GrayCodeAI
    name: tokman
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## TokMan {{ .Tag }}
    
    Token-aware CLI proxy with 31-layer compression pipeline.
    
    ### Installation
    
    ```bash
    # macOS/Linux
    curl -sSL https://github.com/GrayCodeAI/tokman/releases/download/{{ .Tag }}/tokman_{{ .Version }}_$(uname -s)_$(uname -m).tar.gz | tar xz
    
    # Windows (PowerShell)
    Invoke-WebRequest -Uri https://github.com/GrayCodeAI/tokman/releases/download/{{ .Tag }}/tokman_{{ .Version }}_windows_amd64.zip -OutFile tokman.zip
    ```
  footer: |
    
    **Full Changelog**: https://github.com/GrayCodeAI/tokman/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
  - name: tokman
    repository:
      owner: GrayCodeAI
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/GrayCodeAI/tokman"
    description: "Token-aware CLI proxy for AI coding assistants"
    license: "MIT"
    install: |
      bin.install "tokman"
    test: |
      system "#{bin}/tokman", "--version"

dockers:
  - image_templates:
      - "ghcr.io/graycodeai/tokman:{{ .Version }}"
      - "ghcr.io/graycodeai/tokman:latest"
    dockerfile: docker/Dockerfile
    build_flag_templates:
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=MIT"

nfpms:
  - id: packages
    builds:
      - tokman
    package_name: tokman
    homepage: https://github.com/GrayCodeAI/tokman
    maintainer: GrayCodeAI <support@tokman.dev>
    description: Token-aware CLI proxy for AI coding assistants
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

scoops:
  - repository:
      owner: GrayCodeAI
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    homepage: https://github.com/GrayCodeAI/tokman
    description: Token-aware CLI proxy for AI coding assistants
    license: MIT
