<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokMan - Token Optimizer</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #4ade80; font-size: 2em; margin-bottom: 0.5em; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 2em; color: #4ade80; font-weight: bold; }
        .stat-label { color: #9ca3af; margin-top: 5px; }
        .commands { margin-top: 30px; }
        .command { 
            background: rgba(255,255,255,0.05); 
            padding: 15px; 
            border-radius: 8px; 
            margin: 10px 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .command:hover { background: rgba(255,255,255,0.1); }
        .command code { background: #4ade80; color: #1a1a2e; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TokMan Token Optimizer</h1>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="tokensSaved">0</div>
                <div class="stat-label">Tokens Saved</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="commandsRun">0</div>
                <div class="stat-label">Commands Run</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="savings">$0.00</div>
                <div class="stat-label">Cost Savings</div>
            </div>
        </div>
        <div class="commands">
            <h2>Quick Commands</h2>
            <div class="command"><code>tokman status</code> - Show status</div>
            <div class="command"><code>tokman analytics top</code> - Top commands</div>
            <div class="command"><code>tokman dashboard</code> - Open dashboard</div>
        </div>
    </div>
    <script>
        // WebView script for VS Code extension
        if (typeof acquireVsCodeApi !== 'undefined') {
            const vscode = acquireVsCodeApi();
            // Handle messages from extension
        }
    </script>
</body>
</html>
