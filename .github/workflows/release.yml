name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test Before Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Run tests
        run: go test -race ./...

  build-and-release:
    name: Build and Release
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Get version info
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          OUTPUT="tokman-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          CGO_ENABLED=0 go build \
            -ldflags="-s -w \
            -X github.com/GrayCodeAI/tokman/internal/commands/shared.Version=${{ env.VERSION }} \
            -X github.com/GrayCodeAI/tokman/internal/commands/shared.BuildDate=$(date -u +%Y-%m-%d) \
            -X github.com/GrayCodeAI/tokman/internal/commands/shared.GitCommit=${{ github.sha }}" \
            -o "${OUTPUT}" cmd/tokman/main.go

      - name: Create archive
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "tokman-${{ matrix.goos }}-${{ matrix.goarch }}.zip" \
              "tokman-${{ matrix.goos }}-${{ matrix.goarch }}.exe"
          else
            tar -czf "tokman-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
              "tokman-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokman-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tokman-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    name: Create Release
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: tokman-*

      - name: Display artifacts
        run: ls -la artifacts/*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
