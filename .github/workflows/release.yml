name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v0.1.0

permissions:
  contents: write # Required for creating releases

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for proper version detection
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build all platforms
        run: make build-all
      
      - name: Create archives
        run: |
          # Create tar.gz archives for Unix platforms
          tar -czf tokman-linux-amd64.tar.gz tokman-linux-amd64
          tar -czf tokman-linux-arm64.tar.gz tokman-linux-arm64
          tar -czf tokman-darwin-amd64.tar.gz tokman-darwin-amd64
          tar -czf tokman-darwin-arm64.tar.gz tokman-darwin-arm64
          
          # Create zip archive for Windows
          zip tokman-windows-amd64.zip tokman-windows-amd64.exe
          
          # List created archives
          ls -lh tokman-*.tar.gz tokman-*.zip
      
      - name: Generate checksums
        run: |
          sha256sum tokman-*.tar.gz tokman-*.zip > checksums.txt
          cat checksums.txt
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            tokman-linux-amd64.tar.gz
            tokman-linux-arm64.tar.gz
            tokman-darwin-amd64.tar.gz
            tokman-darwin-arm64.tar.gz
            tokman-windows-amd64.zip
            checksums.txt
          body: |
            ## TokMan ${{ steps.version.outputs.VERSION }}
            
            ### Installation
            
            **Homebrew (macOS/Linux):**
            ```bash
            brew install GrayCodeAI/tokman/tokman
            ```
            
            **Install script (Linux/macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/GrayCodeAI/tokman/main/install.sh | sh
            ```
            
            **Manual download:**
            Download the appropriate binary for your platform below.
            
            ### Verify checksums
            ```bash
            sha256sum -c checksums.txt
            ```
            
            ### What's Changed
            
            See [CHANGELOG.md](https://github.com/GrayCodeAI/tokman/blob/main/CHANGELOG.md) for full details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update Homebrew Formula
        if: success()
        run: |
          # Calculate SHA256 for darwin-arm64 (most common Mac)
          SHA256=$(sha256sum tokman-darwin-arm64.tar.gz | awk '{print $1}')
          echo "SHA256 for Homebrew formula: $SHA256"
          echo ""
          echo "Update Formula/tokman.rb with:"
          echo "  url \"https://github.com/GrayCodeAI/tokman/archive/refs/tags/v${{ steps.version.outputs.VERSION }}.tar.gz\""
          echo "  sha256 \"$SHA256\""
