name: Multi-Platform Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
        exclude:
          # Windows on ARM64 is not well supported in GitHub Actions yet
          - os: windows-latest
            arch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Build
      env:
        GOARCH: ${{ matrix.arch }}
        GOOS: ${{ runner.os == 'macOS' && 'darwin' || runner.os == 'Windows' && 'windows' || 'linux' }}
      run: |
        go build -o tokman-${{ matrix.os }}-${{ matrix.arch }} ./cmd/tokman

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tokman-${{ matrix.os }}-${{ matrix.arch }}
        path: tokman-${{ matrix.os }}-${{ matrix.arch }}
        retention-days: 7
