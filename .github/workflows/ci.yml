name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run tests with coverage
        run: go test -short -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          # Fail if coverage drops below 60% (using integer comparison)
          COVERAGE_INT=$(echo "$COVERAGE" | cut -d. -f1)
          if [ "$COVERAGE_INT" -lt 60 ]; then
            echo "Coverage ${COVERAGE}% is below threshold 40%"
            exit 1
          fi
          echo "Coverage OK"
      - name: Run benchmarks
        run: go test -bench=. -benchmem -run=^$ ./benchmarks/... -benchtime=100ms > bench_current.txt
        continue-on-error: true
      - name: Download previous benchmark baseline
        id: cache-bench
        uses: actions/cache@v4
        with:
          path: bench_baseline.txt
          key: benchmark-baseline-${{ runner.os }}
          restore-keys: benchmark-baseline-
      - name: Compare benchmarks
        if: steps.cache-bench.outputs.cache-hit == 'true'
        run: |
          echo "=== Benchmark comparison ==="
          if command -v benchstat &>/dev/null; then
            benchstat bench_baseline.txt bench_current.txt || true
          else
            echo "benchstat not available, showing current results:"
            cat bench_current.txt
          fi
        continue-on-error: true
      - name: Save current benchmarks as new baseline
        run: |
          cp bench_current.txt bench_baseline.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        run: go build -ldflags="-s -w" -o tokman ./cmd/tokman
      - name: Build SIMD (SIMD is default in Go 1.25+)
        run: go build -ldflags="-s -w" -o tokman-simd ./cmd/tokman
