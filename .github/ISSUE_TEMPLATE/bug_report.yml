name: 🐛 Bug Report
description: File a bug report to help us improve TokMan
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: input
    id: version
    attributes:
      label: TokMan Version
      description: What version of TokMan are you running?
      placeholder: "e.g., v0.28.0 or git commit hash"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      options:
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (Other)
        - Windows 10
        - Windows 11
        - FreeBSD
        - Other
    validations:
      required: true

  - type: dropdown
    id: ai-tool
    attributes:
      label: AI Tool Integration
      description: Which AI coding assistant are you using with TokMan?
      options:
        - Claude Code
        - Cursor
        - GitHub Copilot
        - Windsurf
        - Cline / Roo Code
        - Gemini CLI
        - Codex
        - Aider
        - Other
        - Not using AI tool integration
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened!
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run command '...'
        2. With configuration '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Instead, I saw...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please paste any relevant logs (run with `-v` or `--verbose` for detailed output)
      render: shell
      placeholder: |
        $ tokman -v git status
        [paste output here]

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Please paste your TokMan configuration (if relevant)
      render: toml
      placeholder: |
        [filter]
        mode = "minimal"
        ...

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: |
        - This started happening after...
        - Related to issue #...
        - Workaround: ...

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please confirm the following
      options:
        - label: I have searched for similar issues and couldn't find a duplicate
          required: true
        - label: I have tested with the latest version of TokMan
          required: true
        - label: I have included all requested information above
          required: true
        - label: I am willing to help test a fix if needed
          required: false
