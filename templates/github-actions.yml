# Tok CI/CD Integration
# Add this workflow to your repository to track token savings

name: Tok Token Savings

on:
  workflow_run:
    workflows: ["*"]
    types: [completed]

jobs:
  report-savings:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Install Tok
        run: |
          go install github.com/lakshmanpatel/tok/cmd/tok@latest
          
      - name: Generate Savings Report
        run: |
          tok report --period daily --output json > tok-report.json
          tok summary --format markdown >> $GITHUB_STEP_SUMMARY
        env:
          TOK_DATABASE_PATH: ${{ github.workspace }}/.tok/tracking.db
          
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: tok-report
          path: tok-report.json
          retention-days: 30
