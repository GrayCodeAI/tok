# Tok GitLab CI Integration
# Add this to your .gitlab-ci.yml to track token savings

tok-report:
  stage: .post
  image: golang:1.21
  allow_failure: true
  script:
    - go install github.com/lakshmanpatel/tok/cmd/tok@latest
    - tok report --period daily --output json > tok-report.json
    - tok summary --format markdown
  artifacts:
    paths:
      - tok-report.json
    expire_in: 30 days
  variables:
    TOK_DATABASE_PATH: $CI_PROJECT_DIR/.tok/tracking.db
