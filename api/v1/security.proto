syntax = "proto3";

package tokman.security;

option go_package = "github.com/GrayCodeAI/tokman/services/security-service/proto/security";

import "services/shared/proto/common.proto";

// SecurityService provides security scanning and validation
service SecurityService {
  // Scan content for security issues
  rpc ScanContent(ScanRequest) returns (ScanResponse);

  // Redact PII from content
  rpc RedactPII(RedactRequest) returns (RedactResponse);

  // Validate content is safe
  rpc ValidateContent(ValidateRequest) returns (ValidateResponse);

  // Check if content is suspicious
  rpc IsSuspicious(SuspiciousRequest) returns (SuspiciousResponse);

  // Validate a token budget
  rpc ValidateBudget(BudgetRequest) returns (BudgetResponse);

  // Validate a file path
  rpc ValidatePath(PathRequest) returns (PathResponse);

  // Health check
  rpc Health(tokman.common.HealthRequest) returns (tokman.common.HealthResponse);
}

// Finding represents a security finding
message Finding {
  string rule = 1;
  string severity = 2;
  string message = 3;
  int32 position = 4;
}

// ScanRequest
message ScanRequest {
  string content = 1;
  repeated string rules = 2;
}

// ScanResponse
message ScanResponse {
  repeated Finding findings = 1;
  int32 total_findings = 2;
  bool has_critical = 3;
  bool success = 4;
  tokman.common.ErrorDetails error = 5;
}

// RedactRequest
message RedactRequest {
  string content = 1;
  string mask = 2;
}

// RedactResponse
message RedactResponse {
  string original = 1;
  string redacted = 2;
  repeated Finding findings = 3;
}

// ValidateRequest
message ValidateRequest {
  string content = 1;
}

// ValidateResponse
message ValidateResponse {
  bool is_safe = 1;
  repeated Finding findings = 2;
}

// SuspiciousRequest
message SuspiciousRequest {
  string content = 1;
}

// SuspiciousResponse
message SuspiciousResponse {
  bool is_suspicious = 1;
  repeated string patterns_matched = 2;
}

// BudgetRequest
message BudgetRequest {
  int32 budget = 1;
}

// BudgetResponse
message BudgetResponse {
  bool valid = 1;
  string error_message = 2;
  int32 max_allowed = 3;
}

// PathRequest
message PathRequest {
  string path = 1;
}

// PathResponse
message PathResponse {
  bool valid = 1;
  string error_message = 2;
  string sanitized_path = 3;
}
