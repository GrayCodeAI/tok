syntax = "proto3";

package tokman.analytics;

option go_package = "github.com/GrayCodeAI/tokman/services/analytics-service/proto/analytics";

import "services/shared/proto/common.proto";

// AnalyticsService provides command tracking and analytics
service AnalyticsService {
  // Record a command execution
  rpc RecordCommand(RecordCommandRequest) returns (RecordCommandResponse);

  // Get savings summary
  rpc GetSavings(SavingsRequest) returns (SavingsResponse);

  // Get recent commands
  rpc GetRecentCommands(RecentCommandsRequest) returns (RecentCommandsResponse);

  // Get daily savings
  rpc GetDailySavings(DailySavingsRequest) returns (DailySavingsResponse);

  // Get command statistics
  rpc GetCommandStats(CommandStatsRequest) returns (CommandStatsResponse);

  // Get checkpoint telemetry
  rpc GetCheckpointTelemetry(CheckpointTelemetryRequest) returns (CheckpointTelemetryResponse);

  // Health check
  rpc Health(tokman.common.HealthRequest) returns (tokman.common.HealthResponse);
}

// CommandRecord represents a tracked command
message CommandRecord {
  int64 id = 1;
  string command = 2;
  int32 original_tokens = 3;
  int32 filtered_tokens = 4;
  int32 saved_tokens = 5;
  string project_path = 6;
  string session_id = 7;
  int64 exec_time_ms = 8;
  int64 timestamp = 9;
  bool parse_success = 10;
  string agent_name = 11;
  string model_name = 12;
  string provider = 13;
  string model_family = 14;
}

// RecordCommandRequest to record a command
message RecordCommandRequest {
  CommandRecord record = 1;
}

// RecordCommandResponse
message RecordCommandResponse {
  bool success = 1;
  int64 record_id = 2;
  tokman.common.ErrorDetails error = 3;
}

// SavingsRequest
message SavingsRequest {
  string project_path = 1;
  repeated string command_patterns = 2;
  string kind = 3;
  string mode = 4;
}

// SavingsResponse
message SavingsResponse {
  int64 total_commands = 1;
  int64 total_saved = 2;
  int64 total_original = 3;
  int64 total_filtered = 4;
  double reduction_pct = 5;
}

// RecentCommandsRequest
message RecentCommandsRequest {
  string project_path = 1;
  int32 limit = 2;
  repeated string command_patterns = 3;
}

// RecentCommandsResponse
message RecentCommandsResponse {
  repeated CommandRecord commands = 1;
}

// DailySavingsRequest
message DailySavingsRequest {
  string project_path = 1;
  int32 days = 2;
}

// DailySavings represents savings for a day
message DailySavings {
  string date = 1;
  int64 saved = 2;
  int64 original = 3;
  int32 commands = 4;
}

// DailySavingsResponse
message DailySavingsResponse {
  repeated DailySavings daily = 1;
}

// CommandStatsRequest
message CommandStatsRequest {
  string project_path = 1;
}

// CommandStats represents statistics for a command
message CommandStats {
  string command = 1;
  int64 execution_count = 2;
  int64 total_saved = 3;
  int64 total_original = 4;
  double reduction_pct = 5;
}

// CommandStatsResponse
message CommandStatsResponse {
  repeated CommandStats stats = 1;
}

// CheckpointTelemetryRequest
message CheckpointTelemetryRequest {
  int32 days = 1;
}

// CheckpointEvent represents a checkpoint trigger
message CheckpointEvent {
  int64 id = 1;
  int64 command_id = 2;
  string session_id = 3;
  string trigger = 4;
  string reason = 5;
  double fill_pct = 6;
  double quality = 7;
  int32 cooldown_sec = 8;
  int64 created_at = 9;
}

// CheckpointTelemetryResponse
message CheckpointTelemetryResponse {
  int32 days = 1;
  int64 total_events = 2;
  map<string, int64> by_trigger = 3;
  CheckpointEvent last_event = 4;
}
