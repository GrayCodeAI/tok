openapi: 3.0.3
info:
  title: TokMan API
  description: |
    Token-aware CLI proxy with 31-layer compression pipeline.
    
    TokMan intercepts CLI commands and applies intelligent filtering to reduce
    token usage for AI coding assistants. Built on research from 120+ papers.
    
    ## Services
    
    - **Compression Service** (port 8081): 31-layer compression pipeline
    - **Analytics Service** (port 8083): Token tracking and metrics
    - **Agent Service** (port 8084): AI agent integrations
    - **LLM Service** (port 8085): LLM-based summarization
    - **Gateway** (port 8080): Unified API gateway
    
  version: 1.0.0
  contact:
    name: TokMan Support
    url: https://github.com/GrayCodeAI/tokman
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: http://localhost:8081
    description: Compression service (direct)
  - url: http://localhost:8083
    description: Analytics service (direct)

tags:
  - name: compression
    description: Compression operations
  - name: analytics
    description: Analytics and metrics
  - name: layers
    description: Layer information
  - name: health
    description: Health checks

paths:
  /compress:
    post:
      tags:
        - compression
      summary: Compress text
      description: |
        Apply 31-layer compression pipeline to reduce token count.
        
        ### Modes
        - `minimal`: Fast compression with essential layers
        - `aggressive`: Maximum compression with all layers
        
        ### Budget
        Set a token budget to cap output size. Use 0 for unlimited.
      operationId: compress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompressRequest'
            examples:
              minimal:
                value:
                  input: "Long CLI output to compress..."
                  mode: "minimal"
                  budget: 0
              aggressive:
                value:
                  input: "Very verbose output..."
                  mode: "aggressive"
                  budget: 2000
      responses:
        '200':
          description: Compression successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompressResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /layers:
    get:
      tags:
        - layers
      summary: List compression layers
      description: |
        Returns information about all 31 compression layers.
        
        Each layer is based on peer-reviewed research and provides
        specific compression techniques.
      operationId: getLayers
      responses:
        '200':
          description: Layer list
          content:
            application/json:
              schema:
                type: object
                properties:
                  layers:
                    type: array
                    items:
                      $ref: '#/components/schemas/LayerInfo'

  /metrics:
    get:
      tags:
        - analytics
      summary: Get usage metrics
      description: |
        Returns aggregated metrics about token savings and command usage.
      operationId: getMetrics
      responses:
        '200':
          description: Metrics data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'

  /economics:
    get:
      tags:
        - analytics
      summary: Get cost savings
      description: |
        Returns estimated cost savings based on token reduction.
        
        Calculates savings based on model pricing (default: GPT-4).
      operationId: getEconomics
      responses:
        '200':
          description: Economics data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EconomicsResponse'

  /health:
    get:
      tags:
        - health
      summary: Health check
      description: Returns service health status
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  service:
                    type: string
                    example: "compression"
                  version:
                    type: string
                    example: "1.0.0"
                  uptime_seconds:
                    type: integer
                    example: 3600

  /ready:
    get:
      tags:
        - health
      summary: Readiness check
      description: Returns whether service is ready to accept requests
      operationId: readyCheck
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
                  checks:
                    type: object
                    properties:
                      database:
                        type: boolean
                      cache:
                        type: boolean

components:
  schemas:
    CompressRequest:
      type: object
      required:
        - input
      properties:
        input:
          type: string
          description: Text to compress
          example: "Long CLI output..."
        mode:
          type: string
          description: Compression mode
          enum:
            - minimal
            - aggressive
          default: minimal
        budget:
          type: integer
          description: Token budget (0 = unlimited)
          default: 0
          example: 2000
        query_intent:
          type: string
          description: Query intent for context-aware compression
          enum:
            - debug
            - review
            - deploy
            - search
        preset:
          type: string
          description: Pipeline preset
          enum:
            - fast
            - balanced
            - full

    CompressResponse:
      type: object
      properties:
        output:
          type: string
          description: Compressed text
        original_tokens:
          type: integer
          description: Original token count
        compressed_tokens:
          type: integer
          description: Compressed token count
        savings_percent:
          type: number
          format: float
          description: Percentage of tokens saved
        layers_applied:
          type: array
          items:
            type: string
          description: Names of layers that modified output
        processing_time_ms:
          type: integer
          description: Processing time in milliseconds

    LayerInfo:
      type: object
      properties:
        number:
          type: integer
          description: Layer number (1-31)
        name:
          type: string
          description: Layer name
        research:
          type: string
          description: Research paper reference
        compression:
          type: string
          description: Typical compression rate
        description:
          type: string
          description: Layer description
      example:
        number: 1
        name: "Entropy Filter"
        research: "Selective Context (Mila 2023)"
        compression: "30%"
        description: "Remove low-information tokens"

    MetricsResponse:
      type: object
      properties:
        total_commands:
          type: integer
          description: Total commands processed
        total_tokens_saved:
          type: integer
          description: Total tokens saved
        average_savings:
          type: number
          format: float
          description: Average savings percentage
        p99_latency_ms:
          type: number
          format: float
          description: P99 latency in milliseconds
        commands_by_type:
          type: object
          additionalProperties:
            type: integer
          description: Command counts by type
        hourly_stats:
          type: array
          items:
            type: object
            properties:
              hour:
                type: string
              commands:
                type: integer
              tokens_saved:
                type: integer

    EconomicsResponse:
      type: object
      properties:
        tokens_saved:
          type: integer
          description: Total tokens saved
        estimated_cost_saved:
          type: number
          format: float
          description: Estimated cost saved in USD
        model_used:
          type: string
          description: Model used for cost calculation
        cost_per_1k_tokens:
          type: number
          format: float
          description: Cost per 1000 tokens
        period:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: string
          description: Error code
        details:
          type: object
          additionalProperties:
            type: string
          description: Additional error details
