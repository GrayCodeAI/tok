run:
  timeout: 5m
  go: "1.25"
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - nilerr
    - misspell
    - gofmt
    - goimports

linters-settings:
  misspell:
    locale: US
  goimports:
    local-prefixes: github.com/lakshmanpatel/tok

issues:
  exclude-dirs:
    - vendor
    - tests/integration
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*_mock\\.go$"
  exclude-rules:
    - path: _test\.go
      linters:
        - staticcheck
  max-issues-per-linter: 0
  max-same-issues: 0
