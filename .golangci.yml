run:
  timeout: 5m
  go: "1.24"
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - nilerr
    - misspell
    - gofmt
    - goimports

linters-settings:
  misspell:
    locale: US
  goimports:
    local-prefixes: github.com/GrayCodeAI/tok
  staticcheck:
    # U1000: "unused" has too many false positives on types/funcs kept
    # for extension/registration patterns. Re-enable once there's a
    # pass to actually audit each one.
    checks: ["all", "-U1000"]

issues:
  exclude-dirs:
    - vendor
    - tests/integration
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*_mock\\.go$"
  exclude-rules:
    - path: _test\.go
      linters:
        - staticcheck
  max-issues-per-linter: 0
  max-same-issues: 0
