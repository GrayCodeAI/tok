version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tokman-postgres
    environment:
      POSTGRES_USER: tokman
      POSTGRES_PASSWORD: tokman_dev_password
      POSTGRES_DB: tokman
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokman"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tokman-network

  redis:
    image: redis:7-alpine
    container_name: tokman-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tokman-network

  tokman-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: tokman-api
    environment:
      DATABASE_URL: "postgresql://tokman:tokman_dev_password@postgres:5432/tokman"
      REDIS_URL: "redis://redis:6379"
      API_PORT: "8083"
      LOG_LEVEL: "debug"
      COMPRESSION_MODE: "aggressive"
    ports:
      - "8083:8083"
      - "9090:9090"  # Metrics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config:/etc/tokman:ro
    networks:
      - tokman-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  tokman-dashboard:
    build:
      context: ./cmd/dashboard
      dockerfile: Dockerfile
      target: production
    container_name: tokman-dashboard
    environment:
      NEXT_PUBLIC_API_URL: "http://tokman-api:8083"
      NODE_ENV: "production"
    ports:
      - "3000:3000"
    depends_on:
      - tokman-api
    networks:
      - tokman-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: tokman-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    networks:
      - tokman-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]  # Optional: for GPU acceleration

  prometheus:
    image: prom/prometheus:latest
    container_name: tokman-prometheus
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - tokman-network

  grafana:
    image: grafana/grafana:latest
    container_name: tokman-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deployments/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - tokman-network

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  prometheus_data:
  grafana_data:

networks:
  tokman-network:
    driver: bridge
