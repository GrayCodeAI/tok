apiVersion: apps/v1
kind: Deployment
metadata:
  name: tokman-gateway
  labels:
    app: tokman
    service: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tokman
      service: gateway
  template:
    metadata:
      labels:
        app: tokman
        service: gateway
    spec:
      containers:
      - name: gateway
        image: tokman/gateway:latest
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8443
          name: https
        env:
        - name: COMPRESSION_ADDR
          value: "tokman-compression:50051"
        - name: ANALYTICS_ADDR
          value: "tokman-analytics:50053"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tokman-gateway
spec:
  type: LoadBalancer
  selector:
    app: tokman
    service: gateway
  ports:
  - name: http
    port: 80
    targetPort: 8080
  - name: https
    port: 443
    targetPort: 8443
