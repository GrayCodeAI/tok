apiVersion: apps/v1
kind: Deployment
metadata:
  name: tokman-analytics
  labels:
    app: tokman
    service: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tokman
      service: analytics
  template:
    metadata:
      labels:
        app: tokman
        service: analytics
    spec:
      containers:
      - name: analytics
        image: tokman/analytics:latest
        ports:
        - containerPort: 50053
          name: grpc
        - containerPort: 8083
          name: http
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: tokman-data
---
apiVersion: v1
kind: Service
metadata:
  name: tokman-analytics
spec:
  selector:
    app: tokman
    service: analytics
  ports:
  - name: grpc
    port: 50053
    targetPort: 50053
  - name: http
    port: 8083
    targetPort: 8083
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tokman-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
