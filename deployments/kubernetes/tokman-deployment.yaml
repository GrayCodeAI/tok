apiVersion: v1
kind: Namespace
metadata:
  name: tokman

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tokman-config
  namespace: tokman
data:
  API_PORT: "8083"
  DASHBOARD_PORT: "3000"
  LOG_LEVEL: "info"
  COMPRESSION_MODE: "aggressive"
  DATABASE_TYPE: "postgresql"

---
apiVersion: v1
kind: Secret
metadata:
  name: tokman-secrets
  namespace: tokman
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/tokman"
  JWT_SECRET: "your-secret-key-here"
  API_KEY_PREFIX: "tk_"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tokman-api
  namespace: tokman
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: tokman-api
  template:
    metadata:
      labels:
        app: tokman-api
        version: v1
    spec:
      serviceAccountName: tokman
      containers:
      - name: tokman-api
        image: graycodeai/tokman:latest
        imagePullPolicy: Always
        ports:
        - name: grpc
          containerPort: 8083
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: tokman-config
              key: API_PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tokman-secrets
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: tokman-secrets
              key: JWT_SECRET
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8083
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /var/cache/tokman
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - tokman-api
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: tokman-api
  namespace: tokman
  labels:
    app: tokman-api
spec:
  type: ClusterIP
  ports:
  - name: grpc
    port: 8083
    targetPort: 8083
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: tokman-api

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tokman-dashboard
  namespace: tokman
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tokman-dashboard
  template:
    metadata:
      labels:
        app: tokman-dashboard
    spec:
      containers:
      - name: dashboard
        image: graycodeai/tokman-dashboard:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://tokman-api:8083"
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: tokman-dashboard
  namespace: tokman
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  selector:
    app: tokman-dashboard

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tokman-api-hpa
  namespace: tokman
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tokman-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tokman-api-pdb
  namespace: tokman
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: tokman-api

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tokman
  namespace: tokman

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tokman
  namespace: tokman
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tokman
  namespace: tokman
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tokman
subjects:
- kind: ServiceAccount
  name: tokman
  namespace: tokman
