apiVersion: apps/v1
kind: Deployment
metadata:
  name: tokman-compression
  labels:
    app: tokman
    service: compression
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tokman
      service: compression
  template:
    metadata:
      labels:
        app: tokman
        service: compression
    spec:
      containers:
      - name: compression
        image: tokman/compression:latest
        ports:
        - containerPort: 50051
          name: grpc
        - containerPort: 8081
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tokman-compression
spec:
  selector:
    app: tokman
    service: compression
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
  - name: http
    port: 8081
    targetPort: 8081
