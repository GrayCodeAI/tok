# Task 131: Dockerfile
FROM golang:1.26-alpine AS builder
WORKDIR /app
COPY . .
RUN go build -o tok ./cmd/tok

FROM alpine:latest
COPY --from=builder /app/tok /usr/local/bin/
ENTRYPOINT ["tok"]

---
# Task 132-133: Kubernetes & Helm
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tok
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tok
  template:
    metadata:
      labels:
        app: tok
    spec:
      containers:
      - name: tok
        image: tok:latest
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080

---
# Task 134: systemd service
[Unit]
Description=Tok Compression Service
After=network.target

[Service]
Type=simple
ExecStart=/usr/local/bin/tok server
Restart=always

[Install]
WantedBy=multi-user.target

---
# Task 135: Ansible playbook
- name: Deploy Tok
  hosts: all
  tasks:
    - name: Install Tok
      get_url:
        url: https://github.com/GrayCodeAI/tok/releases/latest/download/tok
        dest: /usr/local/bin/tok
        mode: '0755'

---
# Task 136: Terraform module
resource "aws_instance" "tok" {
  ami           = "ami-12345678"
  instance_type = "t3.micro"
  
  user_data = <<-EOF
    #!/bin/bash
    curl -fsSL https://tok.dev/install.sh | sh
  EOF
}

---
# Task 137: Serverless (AWS Lambda)
resource "aws_lambda_function" "tok" {
  filename      = "tok.zip"
  function_name = "tok-compress"
  role          = aws_iam_role.lambda.arn
  handler       = "bootstrap"
  runtime       = "provided.al2"
}

---
# Task 138: CloudFormation
AWSTemplateFormatVersion: '2010-09-09'
Resources:
  TokInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-12345678
      InstanceType: t3.micro

---
# Task 139: GCP Deployment Manager
resources:
- name: tok-vm
  type: compute.v1.instance
  properties:
    zone: us-central1-a
    machineType: zones/us-central1-a/machineTypes/n1-standard-1

---
# Task 140: Azure ARM Template
{
  "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentTemplate.json#",
  "resources": [{
    "type": "Microsoft.Compute/virtualMachines",
    "name": "tok-vm"
  }]
}

---
# Task 141: GitHub Actions
name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
      - run: go build ./...
      - run: go test ./...

---
# Task 142: GitLab CI
stages:
  - build
  - test
build:
  stage: build
  script:
    - go build ./...
test:
  stage: test
  script:
    - go test ./...

---
# Task 143: CircleCI
version: 2.1
jobs:
  build:
    docker:
      - image: golang:1.26
    steps:
      - checkout
      - run: go build ./...
      - run: go test ./...

---
# Task 144: Jenkinsfile
pipeline {
  agent any
  stages {
    stage('Build') {
      steps {
        sh 'go build ./...'
      }
    }
    stage('Test') {
      steps {
        sh 'go test ./...'
      }
    }
  }
}

---
# Task 145: Release automation
name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: goreleaser/goreleaser-action@v2
