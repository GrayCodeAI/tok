syntax = "proto3";

package tokman.compression;

option go_package = "github.com/GrayCodeAI/tokman/services/compression-service/proto/compression";

import "services/shared/proto/common.proto";

// CompressionService provides text compression capabilities
service CompressionService {
  // Compress text using the filter pipeline
  rpc Compress(CompressRequest) returns (CompressResponse);

  // Stream compress for large inputs
  rpc StreamCompress(stream CompressRequest) returns (stream CompressResponse);

  // Get compression statistics
  rpc GetStats(StatsRequest) returns (StatsResponse);

  // Get available filters
  rpc ListFilters(tokman.common.Empty) returns (ListFiltersResponse);

  // Health check
  rpc Health(tokman.common.HealthRequest) returns (tokman.common.HealthResponse);
}

// CompressRequest defines the compression request
message CompressRequest {
  string text = 1;
  tokman.common.CompressionMode mode = 2;
  int32 budget = 3;
  string query_intent = 4;
  tokman.common.PipelinePreset preset = 5;
  map<string, bool> enable_layers = 6;
  map<string, bool> disable_layers = 7;
  string session_id = 8;
}

// CompressResponse defines the compression response
message CompressResponse {
  string original = 1;
  string compressed = 2;
  CompressionStats stats = 3;
  bool success = 4;
  tokman.common.ErrorDetails error = 5;
}

// CompressionStats holds compression statistics
message CompressionStats {
  int32 original_tokens = 1;
  int32 final_tokens = 2;
  int32 total_saved = 3;
  double reduction_percent = 4;
  int64 processing_time_ms = 5;
  map<string, LayerStat> layer_stats = 6;
  bool cache_hit = 7;
}

// LayerStat holds per-layer statistics
message LayerStat {
  string name = 1;
  int32 tokens_saved = 2;
  int64 duration_us = 3;
}

// StatsRequest for querying statistics
message StatsRequest {
  string session_id = 1;
  int64 start_time = 2;
  int64 end_time = 3;
}

// StatsResponse with aggregated statistics
message StatsResponse {
  int64 total_commands = 1;
  int64 total_tokens_saved = 2;
  double avg_reduction_percent = 3;
  map<string, int64> layer_usage = 4;
}

// ListFiltersResponse lists available filters
message ListFiltersResponse {
  repeated FilterInfo filters = 1;
}

// FilterInfo describes a filter
message FilterInfo {
  string name = 1;
  string description = 2;
  bool enabled = 3;
  double avg_compression_ratio = 4;
}
