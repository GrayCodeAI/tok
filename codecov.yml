codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "50...100"
  
  status:
    project:
      default:
        target: 50%
        threshold: 5%
        base: auto
        if_ci_failed: error
        informational: false
        only_pulls: false
    patch:
      default:
        target: 60%
        threshold: 5%
        base: auto
        if_ci_failed: error
        informational: false
        only_pulls: false

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree,components"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 5%
  
  individual_components:
    - component_id: module_core
      name: Core
      paths:
        - internal/core/**
        - internal/config/**
        - internal/utils/**
    
    - component_id: module_filter
      name: Filter Pipeline
      paths:
        - internal/filter/**
    
    - component_id: module_commands
      name: Commands
      paths:
        - internal/commands/**
    
    - component_id: module_tracking
      name: Tracking
      paths:
        - internal/tracking/**
    
    - component_id: module_security
      name: Security
      paths:
        - internal/security/**

github_checks:
  annotations: true
