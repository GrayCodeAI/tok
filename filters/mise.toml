# mise filter
schema_version = 1

[mise]
match_command = "^mise\\s+(run|exec|install|upgrade)\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^mise\\s+(trust|install|upgrade).*✓",
  "^mise\\s+Installing\\s",
  "^mise\\s+Downloading\\s",
  "^mise\\s+Extracting\\s",
  "^mise\\s+\\w+@[\\d.]+ installed",
]
truncate_lines_at = 150
max_lines = 50
on_empty = "mise: ok"
