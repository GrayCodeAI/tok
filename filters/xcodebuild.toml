# xcodebuild filter
schema_version = 1

[xcodebuild]
match_command = "^xcodebuild\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^CompileC\\s",
  "^CompileSwift\\s",
  "^Ld\\s",
  "^CreateBuildDirectory\\s",
  "^MkDir\\s",
  "^ProcessInfoPlistFile\\s",
  "^CopySwiftLibs\\s",
  "^CodeSign\\s",
  "^Signing Identity:",
  "^RegisterWithLaunchServices",
  "^Validate\\s",
  "^ProcessProductPackaging",
  "^Touch\\s",
  "^LinkStoryboards",
  "^CompileStoryboard",
  "^CompileAssetCatalog",
  "^GenerateDSYMFile",
  "^PhaseScriptExecution",
  "^PBXCp\\s",
  "^SetMode\\s",
  "^SetOwnerAndGroup\\s",
  "^Ditto\\s",
  "^CpResource\\s",
  "^CpHeader\\s",
  "^\\s+cd\\s+/",
  "^\\s+export\\s",
  "^\\s+/Applications/Xcode",
  "^\\s+/usr/bin/",
  "^\\s+builtin-",
  "^note: Using new build system",
]
max_lines = 60
on_empty = "xcodebuild: ok"
