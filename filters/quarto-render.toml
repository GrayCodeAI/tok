# quarto-render filter
schema_version = 1

[quarto_render]
match_command = "^quarto\\s+render"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^\\s*processing file:",
  "^\\s*\\d+/\\d+\\s",
  "^\\s*running",
  "^\\s*Rendering",
  "^pandoc ",
  "^  Validating",
  "^  Resolving",
]
match_output = [
  { pattern = "Output created:", message = "ok (output created)" },
]
max_lines = 20
