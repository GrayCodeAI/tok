# pio-run filter
schema_version = 1

[pio_run]
match_command = "^pio\\s+run"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^Verbose mode",
  "^CONFIGURATION:",
  "^LDF:",
  "^Library Manager:",
  "^Compiling\\s",
  "^Linking\\s",
  "^Building\\s",
  "^Checking size",
]
max_lines = 30
on_empty = "pio run: ok"
