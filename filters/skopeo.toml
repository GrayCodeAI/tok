# skopeo filter
schema_version = 1

[skopeo]
match_command = "^skopeo\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^Getting image source signatures",
  "^Copying blob",
  "^Copying config",
  "^Writing manifest",
  "^Storing signatures",
]
max_lines = 30
truncate_lines_at = 120
on_empty = "skopeo: ok"
