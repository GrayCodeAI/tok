repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-json
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-aws-credentials
      - id: forbid-submodules

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: gofmt -l
        language: system
        types: [go]
        pass_filenames: true
      
      - id: go-vet
        name: go vet
        entry: go vet
        language: system
        types: [go]
        pass_filenames: false
        always_run: true
      
      - id: go-imports
        name: go imports
        entry: goimports -l
        language: system
        types: [go]
        pass_filenames: true
      
      - id: go-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false
        always_run: true
      
      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        types: [go]
        pass_filenames: false
        always_run: true
      
      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        types: [go]
        pass_filenames: false
        files: go\.(mod|sum)$
      
      - id: go-generate
        name: go generate
        entry: go generate ./...
        language: system
        types: [go]
        pass_filenames: false
