syntax = "proto3";

package tokman.analytics.v1;

option go_package = "github.com/GrayCodeAI/tokman/pkg/api/proto/analyticsv1";

import "google/protobuf/timestamp.proto";

// AnalyticsService provides enterprise-grade token tracking and analytics.
service AnalyticsService {
  // Record saves a command execution record.
  rpc Record(RecordRequest) returns (RecordResponse);

  // GetMetrics returns aggregated metrics for a team or user.
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);

  // GetEconomics returns cost analysis and ROI.
  rpc GetEconomics(GetEconomicsRequest) returns (GetEconomicsResponse);

  // GetFilterEffectiveness returns filter performance rankings.
  rpc GetFilterEffectiveness(FilterEffectivenessRequest) returns (FilterEffectivenessResponse);

  // GetTrendAnalysis returns historical trends for dashboard.
  rpc GetTrendAnalysis(TrendAnalysisRequest) returns (TrendAnalysisResponse);

  // GetTeamStats returns aggregated stats for a team.
  rpc GetTeamStats(TeamStatsRequest) returns (TeamStatsResponse);

  // GetUserStats returns stats for an individual user.
  rpc GetUserStats(UserStatsRequest) returns (UserStatsResponse);

  // GetCostProjection returns projected monthly costs based on current usage.
  rpc GetCostProjection(CostProjectionRequest) returns (CostProjectionResponse);

  // GetAuditLogs returns audit trail for compliance.
  rpc GetAuditLogs(AuditLogsRequest) returns (AuditLogsResponse);

  // CreateTeam creates a new team/organization.
  rpc CreateTeam(CreateTeamRequest) returns (TeamResponse);

  // GetTeam retrieves team details.
  rpc GetTeam(GetTeamRequest) returns (TeamResponse);

  // UpdateTeamBudget updates the monthly token budget.
  rpc UpdateTeamBudget(UpdateTeamBudgetRequest) returns (TeamResponse);

  // ListUsers lists team members.
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // GetDashboardData returns combined data for dashboard rendering.
  rpc GetDashboardData(DashboardRequest) returns (DashboardResponse);
}

message RecordRequest {
  string team_id = 1;
  string user_id = 2;
  string command = 3;
  int32 original_tokens = 4;
  int32 filtered_tokens = 5;
  int64 duration_ms = 6;
  int32 exit_code = 7;
  string filter_mode = 8;
  string session_id = 9;
  string agent_name = 10;
  string model_name = 11;
  string provider = 12;
}

message RecordResponse {
  bool success = 1;
  int64 record_id = 2;
  string message = 3;
}

message GetMetricsRequest {
  string team_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
  string session_id = 4;
  string user_id = 5;
}

message GetMetricsResponse {
  int64 total_commands = 1;
  int64 total_tokens_saved = 2;
  int64 total_tokens_in = 3;
  int64 total_tokens_out = 4;
  double average_savings_percent = 5;
  double p50_latency_ms = 6;
  double p99_latency_ms = 7;
  repeated FilterUsage top_filters = 8;
  double estimated_savings_usd = 9;
}

message FilterUsage {
  string filter_name = 1;
  int64 count = 2;
  double avg_savings_percent = 3;
  int64 total_tokens_saved = 4;
  double effectiveness_score = 5;
}

message GetEconomicsRequest {
  string team_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
}

message GetEconomicsResponse {
  int64 tokens_saved = 1;
  double estimated_cost_saved = 2;
  double estimated_cost_without_tokman = 3;
  double roi_percent = 4;
  int32 monthly_commands = 5;
  double avg_tokens_per_command = 6;
  string primary_model = 7;
  double cost_per_mtok = 8;
  double quota_used_percent = 9;
}

message FilterEffectivenessRequest {
  string team_id = 1;
  string period = 2; // "day", "week", "month"
  int32 limit = 3;
}

message FilterEffectivenessResponse {
  repeated FilterMetric filters = 1;
}

message FilterMetric {
  string filter_name = 1;
  int64 usage_count = 2;
  double avg_effectiveness = 3;
  int64 total_tokens_saved = 4;
  double avg_processing_time_ms = 5;
  google.protobuf.Timestamp first_used = 6;
  google.protobuf.Timestamp last_used = 7;
}

message TrendAnalysisRequest {
  string team_id = 1;
  string granularity = 2; // "hourly", "daily", "weekly"
  int32 periods = 3; // number of periods to retrieve
}

message TrendAnalysisResponse {
  repeated TrendPoint points = 1;
}

message TrendPoint {
  google.protobuf.Timestamp timestamp = 1;
  int64 total_commands = 2;
  int64 total_original_tokens = 3;
  int64 total_filtered_tokens = 4;
  int64 total_saved_tokens = 5;
  double avg_reduction_percent = 6;
  double estimated_cost_usd = 7;
  double estimated_savings_usd = 8;
}

message TeamStatsRequest {
  string team_id = 1;
}

message TeamStatsResponse {
  string team_id = 1;
  string team_name = 2;
  int32 member_count = 3;
  int64 total_commands = 4;
  int64 total_tokens_saved = 5;
  double avg_reduction_percent = 6;
  int32 monthly_token_budget = 7;
  int32 tokens_used_this_month = 8;
  double estimated_monthly_cost = 9;
}

message UserStatsRequest {
  string team_id = 1;
  string user_id = 2;
}

message UserStatsResponse {
  string user_id = 1;
  string email = 2;
  int64 total_commands = 3;
  int64 total_tokens_saved = 4;
  double avg_reduction_percent = 5;
  google.protobuf.Timestamp last_command = 6;
  string most_used_filter = 7;
}

message CostProjectionRequest {
  string team_id = 1;
  int32 days_to_project = 2; // project this many days ahead
}

message CostProjectionResponse {
  double projected_monthly_cost = 1;
  double projected_monthly_savings = 2;
  double actual_monthly_cost = 3;
  double actual_monthly_savings = 4;
  string projection_basis = 5; // "last_7_days", "last_30_days", etc.
}

message AuditLogsRequest {
  string team_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
  string action_filter = 4; // filter by action type
  int32 limit = 5;
  int32 offset = 6;
}

message AuditLogsResponse {
  repeated AuditLogEntry logs = 1;
  int32 total_count = 2;
}

message AuditLogEntry {
  int64 log_id = 1;
  string user_id = 2;
  string action = 3;
  string resource_type = 4;
  string resource_id = 5;
  string old_value = 6;
  string new_value = 7;
  google.protobuf.Timestamp created_at = 8;
  string ip_address = 9;
}

message CreateTeamRequest {
  string name = 1;
  string slug = 2;
  string description = 3;
  int32 monthly_token_budget = 4;
}

message GetTeamRequest {
  string team_id = 1;
}

message TeamResponse {
  string team_id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  int32 monthly_token_budget = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message UpdateTeamBudgetRequest {
  string team_id = 1;
  int32 new_budget = 2;
}

message ListUsersRequest {
  string team_id = 1;
  string role_filter = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListUsersResponse {
  repeated UserInfo users = 1;
  int32 total_count = 2;
}

message UserInfo {
  string user_id = 1;
  string email = 2;
  string full_name = 3;
  string role = 4; // "admin", "editor", "viewer"
  bool is_active = 5;
  google.protobuf.Timestamp last_login = 6;
  google.protobuf.Timestamp created_at = 7;
}

message DashboardRequest {
  string team_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
}

message DashboardResponse {
  TeamStats team_stats = 1;
  GetEconomicsResponse economics = 2;
  repeated TrendPoint trends = 3;
  repeated FilterMetric top_filters = 4;
  repeated UserStats user_stats = 5;
  CostProjectionResponse projection = 6;
}

message TeamStats {
  int64 total_commands = 1;
  int64 total_tokens_saved = 2;
  double avg_reduction_percent = 3;
  int32 member_count = 4;
  double estimated_monthly_cost = 5;
}

message UserStats {
  string user_id = 1;
  string email = 2;
  int64 commands_today = 3;
  int64 tokens_saved_today = 4;
}
