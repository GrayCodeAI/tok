syntax = "proto3";

package tokman.compression.v1;

option go_package = "github.com/GrayCodeAI/tokman/pkg/api/proto/compressionv1";

// Compression service provides the 31-layer compression pipeline.
service CompressionService {
  // Compress applies the compression pipeline to input text.
  rpc Compress(CompressRequest) returns (CompressResponse);
  
  // GetStats returns compression statistics.
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
  
  // GetLayers returns information about all compression layers.
  rpc GetLayers(GetLayersRequest) returns (GetLayersResponse);
}

message CompressRequest {
  string input = 1;
  string mode = 2;           // none, minimal, aggressive
  string query_intent = 3;
  int32 budget = 4;
  string preset = 5;         // fast, balanced, full
}

message CompressResponse {
  string output = 1;
  int32 original_tokens = 2;
  int32 compressed_tokens = 3;
  double savings_percent = 4;
  repeated string layers_applied = 5;
}

message GetStatsRequest {}

message GetStatsResponse {
  int64 total_compressions = 1;
  int64 total_tokens_saved = 2;
  double average_compression = 3;
  double p99_latency_ms = 4;
}

message GetLayersRequest {}

message GetLayersResponse {
  repeated LayerInfo layers = 1;
}

message LayerInfo {
  int32 number = 1;
  string name = 2;
  string research = 3;
  string compression = 4;
}
