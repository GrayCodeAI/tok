version: '3.8'

services:
  tokman:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: graycodeai/tokman:latest
    container_name: tokman
    restart: unless-stopped
    volumes:
      # Persist data
      - tokman-data:/home/tokman/.local/share/tokman
      - tokman-config:/home/tokman/.config/tokman
      # Mount project directories for filtering
      - ${PROJECT_PATH:-.}:/workspace:ro
    working_dir: /workspace
    environment:
      - TOKMAN_LOG_LEVEL=${TOKMAN_LOG_LEVEL:-info}
      - TOKMAN_SKIP_ENV_VALIDATION=${TOKMAN_SKIP_ENV_VALIDATION:-false}
    ports:
      # Dashboard port (optional)
      - "8080:8080"
    command: ["dashboard", "--port", "8080", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "tokman", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: TokMan with Redis for distributed tracking
  tokman-redis:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: graycodeai/tokman:latest
    container_name: tokman-redis
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TOKMAN_REDIS_URL=redis://redis:6379
    healthcheck:
      test: ["CMD", "tokman", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: tokman-redis-srv
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  tokman-data:
  tokman-config:
  redis-data:
