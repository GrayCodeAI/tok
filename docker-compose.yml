version: '3.8'

services:
  tokman:
    build:
      context: .
      dockerfile: Dockerfile
    image: tokman:latest
    container_name: tokman
    volumes:
      # Mount host config directory
      - ./config:/config/tokman:ro
      # Mount data directory for persistence
      - tokman-data:/data/tokman
      # Mount current directory for file operations
      - .:/workspace:rw
    working_dir: /workspace
    environment:
      - TOKMAN_CONFIG=/config/tokman/config.toml
      - TOKMAN_DATA_DIR=/data/tokman
      - TOKMAN_VERBOSE=1
    # Override entrypoint to keep container running for exec
    entrypoint: ["/bin/sh", "-c", "sleep infinity"]
    # Or use for one-off commands:
    # entrypoint: ["tokman"]
    # command: ["--help"]

  # Dashboard service (optional)
  tokman-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: tokman:latest
    container_name: tokman-dashboard
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config/tokman:ro
      - tokman-data:/data/tokman
    environment:
      - TOKMAN_CONFIG=/config/tokman/config.toml
      - TOKMAN_DATA_DIR=/data/tokman
    command: ["dashboard", "--port", "8080", "--host", "0.0.0.0"]
    depends_on:
      - tokman

  # Development service with full toolchain
  tokman-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: tokman:dev
    container_name: tokman-dev
    volumes:
      - .:/app:rw
      - /app/vendor
      - go-cache:/go/pkg/mod
    working_dir: /app
    environment:
      - GO111MODULE=on
      - CGO_ENABLED=0
    command: ["sleep", "infinity"]

volumes:
  tokman-data:
    driver: local
  go-cache:
    driver: local
